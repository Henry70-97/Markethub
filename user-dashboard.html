<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen · M-Pesa Payment</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- PayHero SDK -->
    <script src="https://applet.payherokenya.com/cdn/button_sdk.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .payment-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .user-info {
            background: #f8fafc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #e2e8f0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .info-label {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        .info-value {
            color: #1e293b;
            font-weight: 700;
            font-size: 16px;
        }

        .info-value.highlight {
            color: #10b981;
            font-size: 20px;
        }

        .payment-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }

        .payment-section h3 {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .amount {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .amount small {
            font-size: 14px;
            font-weight: 400;
            opacity: 0.9;
        }

        .phone-input-group {
            margin: 20px 0;
        }

        .phone-input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .phone-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .phone-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .payhero-button-container {
            margin: 20px 0;
            min-height: 50px;
            display: flex;
            justify-content: center;
        }

        #payHeroButton {
            width: 100%;
        }

        /* PayHero button styling */
        .payhero-btn {
            background: #25D366 !important;
            color: white !important;
            padding: 15px !important;
            border-radius: 12px !important;
            font-size: 16px !important;
            font-weight: 700 !important;
            border: none !important;
            cursor: pointer !important;
            width: 100% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 10px !important;
            transition: all 0.3s !important;
        }

        .payhero-btn:hover {
            background: #128C7E !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3) !important;
        }

        .payment-status {
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            font-weight: 600;
            text-align: center;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .payment-status.success {
            background: #10b98120;
            color: #10b981;
            border: 2px solid #10b981;
        }

        .payment-status.error {
            background: #ef444420;
            color: #ef4444;
            border: 2px solid #ef4444;
        }

        .payment-status.pending {
            background: #f59e0b20;
            color: #f59e0b;
            border: 2px solid #f59e0b;
        }

        .payment-status.info {
            background: #3b82f620;
            color: #3b82f6;
            border: 2px solid #3b82f6;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #64748b;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .info-text {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 15px;
            text-align: center;
        }

        .info-text i {
            color: #667eea;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f1f5f9;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .alert.error {
            background: #fee2e2;
            color: #dc2626;
            border: 2px solid #fecaca;
        }

        .alert.success {
            background: #d1fae5;
            color: #059669;
            border: 2px solid #a7f3d0;
        }

        .manual-pay-button {
            background: #25D366;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .manual-pay-button:hover {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .manual-pay-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .manual-pay-button i {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="payment-card" id="paymentCard">
            <div class="header">
                <h1>🔷 NextGen Payments</h1>
                <p>Pay with M-Pesa via PayHero</p>
            </div>

            <div id="loadingScreen" class="loading">
                <div class="loading-spinner"></div>
                <p>Loading your information...</p>
            </div>

            <div id="errorScreen" style="display: none;">
                <div class="alert error">
                    <i class="fas fa-exclamation-circle" style="font-size: 24px; margin-bottom: 10px;"></i>
                    <h3>Error Loading Data</h3>
                    <p id="errorMessage">Please try again</p>
                    <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 15px;">
                        <i class="fas fa-redo"></i> Retry
                    </button>
                </div>
            </div>

            <div id="paymentScreen" style="display: none;">
                <div class="user-info" id="userInfo">
                    <!-- Will be filled by JavaScript -->
                </div>

                <div class="payment-section">
                    <h3 id="itemName">Premium Membership</h3>
                    <div class="amount" id="itemAmount">KES 0</div>
                    <p id="itemDescription">Annual subscription</p>
                </div>

                <div class="phone-input-group">
                    <label><i class="fas fa-phone-alt"></i> M-Pesa Phone Number</label>
                    <input type="tel" id="phoneNumber" class="phone-input" placeholder="e.g., 0712345678" value="">
                </div>

                <!-- PayHero Button Container -->
                <div class="payhero-button-container">
                    <div id="payHeroButton"></div>
                </div>

                <!-- Manual Pay Button (Fallback) -->
                <button id="manualPayButton" class="manual-pay-button" style="display: none;" onclick="initiateManualPayment()">
                    <i class="fas fa-mobile-alt"></i>
                    Pay with M-Pesa
                </button>

                <div id="paymentStatus" class="payment-status" style="display: none;"></div>

                <button class="btn btn-secondary" onclick="goBack()" id="backButton">
                    <i class="fas fa-arrow-left"></i> Back
                </button>

                <div class="info-text">
                    <i class="fas fa-info-circle"></i>
                    You'll receive an STK push on your phone. Enter your PIN to complete payment.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",
            authDomain: "nextgen-5fb6f.firebaseapp.com",
            projectId: "nextgen-5fb6f",
            storageBucket: "nextgen-5fb6f.firebasestorage.app",
            messagingSenderId: "100132076455",
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // PayHero Configuration - REPLACE WITH YOUR ACTUAL VALUES
        const PAYHERO_CONFIG = {
            paymentUrl: "https://app.payhero.co.ke/lipwa/3859", // Get from PayHero dashboard
            channelID: 5272 // Replace with your actual channel ID
        };

        // DOM Elements
        const loadingScreen = document.getElementById('loadingScreen');
        const errorScreen = document.getElementById('errorScreen');
        const paymentScreen = document.getElementById('paymentScreen');
        const errorMessage = document.getElementById('errorMessage');
        const userInfo = document.getElementById('userInfo');
        const itemName = document.getElementById('itemName');
        const itemAmount = document.getElementById('itemAmount');
        const itemDescription = document.getElementById('itemDescription');
        const phoneInput = document.getElementById('phoneNumber');
        const payHeroButton = document.getElementById('payHeroButton');
        const manualPayButton = document.getElementById('manualPayButton');
        const paymentStatus = document.getElementById('paymentStatus');

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'membership';
        const itemId = urlParams.get('id') || 'premium';
        const amount = parseInt(urlParams.get('amount')) || 390;
        const name = urlParams.get('name') || 'Premium Membership';

        // Global variables
        let currentUser = null;
        let userData = null;
        let payHeroInitialized = false;
        let currentReference = null;

        // Check authentication and load user data
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    throw new Error('User data not found');
                }

                userData = userDoc.data();
                currentUser = user;

                // Update UI
                updateUserInfo();
                updateItemDetails();
                
                // Hide loading, show payment screen
                loadingScreen.style.display = 'none';
                paymentScreen.style.display = 'block';

                // Auto-fill phone number if available
                if (userData.phone) {
                    phoneInput.value = userData.phone;
                }

                // Add phone input listener
                phoneInput.addEventListener('input', handlePhoneInput);
                
                // Check if PayHero is loaded
                checkPayHeroLoaded();

            } catch (error) {
                console.error('Error loading user data:', error);
                loadingScreen.style.display = 'none';
                errorScreen.style.display = 'block';
                errorMessage.textContent = error.message || 'Failed to load user data';
            }
        });

        function checkPayHeroLoaded() {
            if (window.PayHero) {
                console.log('PayHero loaded successfully');
                showPaymentStatus('PayHero ready', 'info');
                // If phone is already filled, try to initialize
                if (phoneInput.value.length >= 10) {
                    setTimeout(() => initializePayHero(phoneInput.value), 500);
                }
            } else {
                console.log('PayHero not loaded, showing manual button');
                // Show manual button as fallback
                manualPayButton.style.display = 'block';
                showPaymentStatus('Using manual payment option', 'info');
            }
        }

        function handlePhoneInput() {
            const phone = phoneInput.value.trim();
            
            // Clear previous button if phone is too short
            if (phone.length < 10) {
                payHeroButton.innerHTML = '';
                manualPayButton.style.display = 'block';
                payHeroInitialized = false;
                hidePaymentStatus();
                return;
            }

            // Format phone number (remove any non-digits)
            const cleanPhone = phone.replace(/\D/g, '');
            
            // Check if it's a valid Kenyan number
            if (cleanPhone.length === 9 && cleanPhone.startsWith('7')) {
                phoneInput.value = '0' + cleanPhone;
            } else if (cleanPhone.length === 12 && cleanPhone.startsWith('254')) {
                phoneInput.value = '0' + cleanPhone.substring(3);
            }

            // Try to initialize PayHero if available
            if (window.PayHero && !payHeroInitialized) {
                initializePayHero(phoneInput.value);
            } else {
                // Show manual button as fallback
                manualPayButton.style.display = 'block';
            }
        }

        function initializePayHero(phone) {
            try {
                // Generate unique reference
                currentReference = `${type}-${itemId}-${Date.now()}-${currentUser.uid.substring(0,6)}`;

                // Clear previous button
                payHeroButton.innerHTML = '';

                // Show pending status
                showPaymentStatus('Initializing PayHero...', 'pending');

                console.log('Initializing PayHero with:', {
                    paymentUrl: PAYHERO_CONFIG.paymentUrl,
                    channelID: PAYHERO_CONFIG.channelID,
                    amount: amount,
                    phone: phone,
                    reference: currentReference
                });

                // Initialize PayHero
                PayHero.init({
                    paymentUrl: PAYHERO_CONFIG.paymentUrl,
                    containerId: "payHeroButton",
                    channelID: PAYHERO_CONFIG.channelID,
                    amount: amount,
                    phone: phone,
                    reference: currentReference,
                    name: itemName.textContent,
                    onSuccess: function(response) {
                        console.log('Payment successful:', response);
                        showPaymentStatus('Payment successful! Processing...', 'success');
                        recordPayment(currentReference, response);
                        payHeroInitialized = true;
                        manualPayButton.style.display = 'none';
                    },
                    onError: function(error) {
                        console.error('Payment error:', error);
                        showPaymentStatus('Payment failed. Please try again.', 'error');
                        payHeroInitialized = false;
                        manualPayButton.style.display = 'block';
                        
                        // Clear button
                        payHeroButton.innerHTML = '';
                        
                        // Allow retry after 3 seconds
                        setTimeout(() => {
                            hidePaymentStatus();
                        }, 3000);
                    }
                });

                payHeroInitialized = true;
                manualPayButton.style.display = 'none';
                hidePaymentStatus();

            } catch (error) {
                console.error('Error initializing PayHero:', error);
                showPaymentStatus('Failed to initialize payment. Using manual option.', 'error');
                manualPayButton.style.display = 'block';
            }
        }

        // Manual payment initiation (fallback)
        function initiateManualPayment() {
            const phone = phoneInput.value.trim();
            
            if (phone.length < 10) {
                showPaymentStatus('Please enter a valid phone number', 'error');
                return;
            }

            // Generate reference
            currentReference = `${type}-${itemId}-${Date.now()}-${currentUser.uid.substring(0,6)}`;
            
            // Show payment instructions
            showPaymentStatus(`
                STK Push sent to ${phone}. Please check your phone and enter PIN to complete payment.
            `, 'info');

            // Simulate payment success after 5 seconds (for demo)
            setTimeout(() => {
                showPaymentStatus('Payment successful! (Demo)', 'success');
                recordPayment(currentReference, { reference: currentReference });
            }, 5000);
        }

        async function recordPayment(reference, response) {
            try {
                showPaymentStatus('Recording payment...', 'pending');

                // Record payment in Firestore
                await db.collection('payments').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userName: userData.displayName,
                    itemType: type,
                    itemId: itemId,
                    itemName: itemName.textContent,
                    amount: amount,
                    reference: reference,
                    status: 'completed',
                    payheroReference: response?.reference || reference,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                if (type === 'membership') {
                    // Calculate expiry
                    const expiry = new Date();
                    if (itemId === 'premium') {
                        expiry.setFullYear(expiry.getFullYear() + 1);
                    } else if (itemId === 'elite') {
                        expiry.setFullYear(expiry.getFullYear() + 10);
                    }

                    // Update user's membership
                    await db.collection('users').doc(currentUser.uid).update({
                        membershipType: itemId,
                        membershipPaid: true,
                        membershipStatus: 'active',
                        membershipExpiry: expiry,
                        phone: phoneInput.value // Save phone number
                    });

                    // Add welcome bonus for Elite
                    if (itemId === 'elite') {
                        await db.collection('users').doc(currentUser.uid).update({
                            wallet: firebase.firestore.FieldValue.increment(10)
                        });
                    }

                    // Send notification
                    await db.collection('notifications').add({
                        userId: currentUser.uid,
                        type: 'membership',
                        title: 'Membership Activated! 🎉',
                        message: `Your ${itemId} membership has been activated successfully.`,
                        read: false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                } else if (type === 'training') {
                    // Check if already applied
                    const existing = await db.collection('trainingApplications')
                        .where('userId', '==', currentUser.uid)
                        .where('trainingId', '==', itemId)
                        .get();

                    if (existing.empty) {
                        await db.collection('trainingApplications').add({
                            userId: currentUser.uid,
                            userName: userData.displayName,
                            userEmail: currentUser.email,
                            trainingId: itemId,
                            trainingTitle: name,
                            type: 'prepaid',
                            price: amount,
                            paymentReference: reference,
                            paymentVerified: true,
                            status: 'approved',
                            appliedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        await db.collection('notifications').add({
                            userId: currentUser.uid,
                            type: 'training',
                            title: 'Enrollment Successful! 📚',
                            message: `You've been enrolled in ${name}.`,
                            read: false,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                }

                // Save phone number if not already saved
                if (!userData.phone) {
                    await db.collection('users').doc(currentUser.uid).update({
                        phone: phoneInput.value
                    });
                }

                showPaymentStatus('Payment completed successfully! Redirecting...', 'success');
                
                // Redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 3000);

            } catch (error) {
                console.error('Error recording payment:', error);
                showPaymentStatus('Payment recorded but failed to update account. Contact support.', 'error');
            }
        }

        function showPaymentStatus(message, type) {
            paymentStatus.textContent = message;
            paymentStatus.className = `payment-status ${type}`;
            paymentStatus.style.display = 'block';
        }

        function hidePaymentStatus() {
            paymentStatus.style.display = 'none';
        }

        function updateUserInfo() {
            if (!userData) return;

            const joinDate = userData.createdAt?.seconds 
                ? new Date(userData.createdAt.seconds * 1000).toLocaleDateString() 
                : 'N/A';

            userInfo.innerHTML = `
                <div class="info-row">
                    <span class="info-label">Name</span>
                    <span class="info-value">${escapeHtml(userData.displayName || 'User')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value">${escapeHtml(userData.email || '')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Wallet Balance</span>
                    <span class="info-value highlight">$${(userData.wallet || 0).toFixed(2)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Member Since</span>
                    <span class="info-value">${joinDate}</span>
                </div>
            `;
        }

        function updateItemDetails() {
            if (type === 'membership') {
                if (itemId === 'premium') {
                    itemName.textContent = 'Premium Membership';
                    itemAmount.textContent = `KES ${amount}`;
                    itemDescription.textContent = '✓ Access to all tasks • ✓ Withdrawals enabled • ✓ Priority support';
                } else if (itemId === 'elite') {
                    itemName.textContent = 'Elite Membership';
                    itemAmount.textContent = `KES ${amount}`;
                    itemDescription.textContent = '✓ All Premium benefits • ✓ KES 1,300 welcome bonus • ✓ Lifetime access';
                }
            } else if (type === 'training') {
                itemName.textContent = name;
                itemAmount.textContent = `KES ${amount}`;
                itemDescription.textContent = '✓ Instant enrollment • ✓ Lifetime access • ✓ Certificate included';
            }
        }

        function goBack() {
            window.history.back();
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return unsafe;
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Ensure PayHero is loaded
        window.addEventListener('load', function() {
            if (!window.PayHero) {
                console.log('PayHero not detected, loading script...');
                const script = document.createElement('script');
                script.src = 'https://applet.payherokenya.com/cdn/button_sdk.js';
                script.async = true;
                document.body.appendChild(script);
                
                script.onload = function() {
                    console.log('PayHero SDK loaded successfully');
                    checkPayHeroLoaded();
                };
                
                script.onerror = function() {
                    console.error('Failed to load PayHero SDK');
                    manualPayButton.style.display = 'block';
                    showPaymentStatus('Using manual payment option', 'info');
                };
            }
        });
    </script>
</body>
</html>
