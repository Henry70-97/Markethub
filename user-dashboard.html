<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NextGen · User Dashboard</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Bright gradient background */
        body { 
            background: linear-gradient(135deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh; 
            padding: 20px;
        }
        
        .app-container { 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        
        /* Bright header with glass effect */
        .header { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem; 
            padding: 1rem 2rem; 
            margin-bottom: 2rem; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 2px solid rgba(255,255,255,0.5);
        }
        
        .logo h2 { 
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #45B7D1);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            font-weight: 800;
        }
        
        .user-menu { 
            display: flex; 
            align-items: center; 
            gap: 1rem; 
        }
        
        .wallet-badge { 
            background: linear-gradient(135deg, #FFD93D, #FF9F1C);
            padding: 0.5rem 1.5rem; 
            border-radius: 40px; 
            color: #1e1e2f; 
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(255, 159, 28, 0.3);
        }
        
        #userName {
            background: linear-gradient(135deg, #A8E6CF, #3B9AE1);
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            color: #1e1e2f;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(59, 154, 225, 0.3);
        }
        
        .logout-btn { 
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            border: none; 
            color: white; 
            font-size: 1.2rem; 
            cursor: pointer; 
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.5);
        }
        
        /* Bright stats grid with alternating colors */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 1.5rem; 
            margin-bottom: 2rem; 
        }
        
        .stat-card { 
            border-radius: 1.5rem; 
            padding: 2rem; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.8);
        }
        
        .stat-card:nth-child(1) { 
            background: linear-gradient(135deg, #FF9A9E, #FAD0C4);
        }
        .stat-card:nth-child(2) { 
            background: linear-gradient(135deg, #A18CD1, #FBC2EB);
        }
        .stat-card:nth-child(3) { 
            background: linear-gradient(135deg, #FAD0C4, #FFD1FF);
        }
        .stat-card:nth-child(4) { 
            background: linear-gradient(135deg, #FFD1FF, #FAD0C4);
        }
        
        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
        }
        
        .stat-card i { 
            font-size: 2.5rem; 
            color: #1e1e2f; 
            margin-bottom: 0.8rem; 
            background: rgba(255,255,255,0.3);
            padding: 1rem;
            border-radius: 50%;
        }
        
        .stat-value { 
            font-size: 2.2rem; 
            font-weight: 800; 
            color: #1e1e2f; 
            margin-bottom: 0.3rem;
        }
        
        .stat-label { 
            color: #2d3436; 
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        /* Bright tabs */
        .tabs { 
            display: flex; 
            gap: 0.8rem; 
            flex-wrap: wrap; 
            margin-bottom: 2rem; 
        }
        
        .tab { 
            padding: 1rem 2rem; 
            border: none; 
            border-radius: 40px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s;
            font-size: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .tab:nth-child(1) { background: #FFEAA7; color: #2D4059; }
        .tab:nth-child(2) { background: #B5F0F0; color: #2D4059; }
        .tab:nth-child(3) { background: #FFC4D0; color: #2D4059; }
        .tab:nth-child(4) { background: #C4E0F9; color: #2D4059; }
        .tab:nth-child(5) { background: #DAB6F9; color: #2D4059; }
        
        .tab.active {
            transform: scale(1.05);
            filter: brightness(1.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .tab:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        
        /* Bright content area */
        .content { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem; 
            padding: 2.5rem; 
            min-height: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 2px solid rgba(255,255,255,0.8);
        }
        
        /* Bright task grid */
        .task-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 1.8rem; 
        }
        
        /* Alternating bright card colors */
        .task-card:nth-child(5n+1) { 
            background: linear-gradient(145deg, #FFB6B6, #FFE0AC);
            border: 2px solid #FF8C8C;
        }
        .task-card:nth-child(5n+2) { 
            background: linear-gradient(145deg, #B6E2D4, #F0F0B6);
            border: 2px solid #7FB77E;
        }
        .task-card:nth-child(5n+3) { 
            background: linear-gradient(145deg, #C4E0F9, #E5C4F9);
            border: 2px solid #7C9D8E;
        }
        .task-card:nth-child(5n+4) { 
            background: linear-gradient(145deg, #FFD4D4, #FFBFA0);
            border: 2px solid #FF7B7B;
        }
        .task-card:nth-child(5n+5) { 
            background: linear-gradient(145deg, #C4F0C4, #F0F0C4);
            border: 2px solid #9AD0A0;
        }
        
        .task-card { 
            border-radius: 1.5rem; 
            padding: 1.8rem; 
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .task-card:hover { 
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0,0,0,0.15);
        }
        
        .task-title { 
            color: #1e1e2f; 
            font-weight: 800; 
            font-size: 1.3rem; 
            margin-bottom: 0.8rem; 
        }
        
        .task-amount { 
            background: rgba(255,255,255,0.3);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-weight: 700; 
            font-size: 1.3rem;
            color: #1e1e2f;
            display: inline-block;
        }
        
        /* Bright badges */
        .badge { 
            padding: 0.4rem 1.2rem; 
            border-radius: 40px; 
            font-size: 0.9rem; 
            font-weight: 700; 
            display: inline-block; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
        
        .badge.primary { 
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            color: white; 
        }
        .badge.success { 
            background: linear-gradient(135deg, #4ECDC4, #45B7D1);
            color: white; 
        }
        .badge.warning { 
            background: linear-gradient(135deg, #FFE66D, #FFD93D);
            color: #1e1e2f; 
        }
        .badge.danger { 
            background: linear-gradient(135deg, #FF8066, #FF4D4D);
            color: white; 
        }
        
        /* Bright buttons */
        .btn { 
            padding: 0.8rem 1.5rem; 
            border: none; 
            border-radius: 40px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s;
            font-size: 0.95rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, #667EEA, #764BA2);
            color: white; 
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success { 
            background: linear-gradient(135deg, #10B981, #059669);
            color: white; 
        }
        .btn-success:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }
        
        .btn-secondary { 
            background: linear-gradient(135deg, #94A3B8, #64748B);
            color: white; 
        }
        
        .btn-accept { 
            background: linear-gradient(135deg, #F59E0B, #FBBF24);
            color: #1e1e2f; 
            font-weight: 800;
        }
        .btn-accept:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
        }
        
        .btn-info { 
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white; 
        }
        
        /* Bright submission cards */
        .submission-card { 
            background: white;
            border-radius: 1.2rem; 
            padding: 1.5rem; 
            margin-bottom: 1rem; 
            border: 2px solid transparent;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .submission-card:hover {
            border-color: #667EEA;
            transform: translateX(5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        /* Message cards with alternating colors */
        .message-card:nth-child(odd) {
            background: linear-gradient(145deg, #FFE5E5, #FFF0F0);
        }
        
        .message-card:nth-child(even) {
            background: linear-gradient(145deg, #E5F0FF, #F0F5FF);
        }
        
        .message-card.unread {
            border-left: 8px solid #FF6B6B;
            background: linear-gradient(145deg, #FFF0F0, #FFE5E5);
        }
        
        /* Premium badge */
        .premium-badge { 
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1e1e2f; 
            padding: 0.3rem 1.2rem; 
            border-radius: 40px; 
            font-size: 0.9rem; 
            font-weight: 700; 
            box-shadow: 0 3px 10px rgba(255, 215, 0, 0.3);
        }
        
        .lipwa-badge { 
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white; 
            padding: 0.3rem 1.2rem; 
            border-radius: 40px; 
            font-size: 0.9rem; 
            font-weight: 700; 
        }
        
        /* Balance highlight */
        .balance-highlight { 
            font-size: 2.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #10B981, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Fee breakdown */
        .fee-breakdown {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            border-radius: 1rem;
            padding: 1.2rem;
            margin: 1rem 0;
            border: 2px solid #667EEA;
        }
        
        /* Modal styling */
        .modal { 
            background: linear-gradient(145deg, #F9FAFB, #F3F4F6);
            border: 3px solid #667EEA;
        }
        
        /* Alert dialog */
        .alert-dialog {
            background: linear-gradient(145deg, #F9FAFB, #F3F4F6);
            border: 3px solid;
        }
        
        .alert-dialog.error {
            border-color: #EF4444;
        }
        
        .alert-dialog.success {
            border-color: #10B981;
        }
        
        .alert-dialog button {
            background: linear-gradient(135deg, #667EEA, #764BA2);
        }
        
        /* Empty state */
        .empty-state i {
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Loading spinner */
        .loading i {
            background: linear-gradient(135deg, #667EEA, #764BA2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Message bubbles */
        .message-bubble.user {
            background: linear-gradient(135deg, #667EEA, #764BA2);
        }
        
        .message-bubble.admin {
            background: linear-gradient(135deg, #F3F4F6, #E5E7EB);
            border: 2px solid #667EEA;
        }
        
        /* Submit textbox */
        .submit-textbox {
            background: rgba(255,255,255,0.9);
            border: 3px solid #10B981;
        }
        
        /* Input fields */
        input, textarea, select {
            background: rgba(255,255,255,0.9);
            border: 3px solid transparent;
            transition: all 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: #667EEA;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">
                <h2>🔷 NextGen Tasks</h2>
            </div>
            <div class="user-menu">
                <div class="wallet-badge" id="walletDisplay">$0.00</div>
                <span id="userName">Loading...</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('tasks')">📋 Available Tasks</button>
            <button class="tab" onclick="switchTab('submissions')">📝 My Submissions</button>
            <button class="tab" onclick="switchTab('withdrawals')">💰 Withdrawals</button>
            <button class="tab" onclick="switchTab('messages')">
                💬 Messages 
                <span id="unreadMessagesBadge" style="display:none; background:#FF6B6B; color:white; border-radius:40px; padding:0.2rem 0.5rem; font-size:0.7rem; margin-left:0.3rem;">0</span>
            </button>
            <button class="tab" onclick="switchTab('profile')">👤 Profile</button>
        </div>
        
        <div class="content" id="content">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading dashboard...</p>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal" id="modal">
        <div id="modalContent"></div>
        <div class="flex-row" style="justify-content: flex-end; margin-top: 1rem;">
            <button class="btn btn-primary" onclick="closeModal()">Close</button>
        </div>
    </div>
    
    <!-- Alert Dialog -->
    <div class="overlay" id="overlay" onclick="hideAlert()"></div>
    <div class="alert-dialog" id="alertDialog">
        <i class="fas" id="alertIcon"></i>
        <h3 id="alertTitle"></h3>
        <p id="alertMessage"></p>
        <button onclick="hideAlert()">OK</button>
    </div>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",
            authDomain: "nextgen-5fb6f.firebaseapp.com",
            projectId: "nextgen-5fb6f",
            storageBucket: "nextgen-5fb6f.firebasestorage.app",
            messagingSenderId: "100132076455",
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Fee constants
        const TRANSACTION_FEE_PERCENT = 3; // 3%
        const PLATFORM_FEE_PERCENT = 2; // 2%
        const TOTAL_FEE_PERCENT = TRANSACTION_FEE_PERCENT + PLATFORM_FEE_PERCENT; // 5%
        
        // Enable offline persistence with error handling
        db.enablePersistence()
            .then(() => console.log('Persistence enabled'))
            .catch((err) => {
                if (err.code == 'failed-precondition') {
                    console.log('Persistence failed: Multiple tabs open');
                } else if (err.code == 'unimplemented') {
                    console.log('Persistence not available');
                }
            });
        
        // Global variables
        let currentUser = null;
        let userData = null;
        let messagesListener = null;
        
        // Alert functions
        function showAlert(message, type = 'error') {
            const alertDialog = document.getElementById('alertDialog');
            const overlay = document.getElementById('overlay');
            const alertIcon = document.getElementById('alertIcon');
            const alertTitle = document.getElementById('alertTitle');
            const alertMessage = document.getElementById('alertMessage');
            
            alertDialog.className = 'alert-dialog ' + type;
            alertIcon.className = 'fas ' + (type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle');
            alertTitle.textContent = type === 'error' ? 'Error!' : 'Success!';
            alertMessage.textContent = message;
            
            alertDialog.classList.add('show');
            overlay.classList.add('show');
        }
        
        function hideAlert() {
            document.getElementById('alertDialog').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
        
        // Modal functions
        function showModal(html) {
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('modalBackdrop').classList.remove('active');
        }
        
        document.getElementById('modalBackdrop').addEventListener('click', closeModal);
        
        // Logout function
        function logout() {
            // Clean up listeners
            if (messagesListener) {
                messagesListener();
            }
            auth.signOut();
            window.location.href = 'index.html';
        }
        
        // Tab switching function
        function switchTab(tab) {
            // Update active tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Load appropriate content
            switch(tab) {
                case 'tasks':
                    loadTasks();
                    break;
                case 'submissions':
                    loadSubmissions();
                    break;
                case 'withdrawals':
                    loadWithdrawals();
                    break;
                case 'messages':
                    loadMessages();
                    break;
                case 'profile':
                    loadProfile();
                    break;
            }
        }
        
        // Check auth state
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            // Check email verification (skip for Google users)
            const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
            if (!user.emailVerified && !isGoogle) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                // Get user data
                const doc = await db.collection('users').doc(user.uid).get();
                
                if (!doc.exists) {
                    // Create user document if it doesn't exist
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        displayName: user.displayName || 'User',
                        phone: '',
                        role: 'user',
                        wallet: 0,
                        active: true,
                        verified: user.emailVerified || isGoogle,
                        membershipPaid: false,
                        membershipStatus: 'pending',
                        totalFeesPaid: 0,
                        unreadMessages: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    // Fetch the newly created document
                    const newDoc = await db.collection('users').doc(user.uid).get();
                    userData = { id: user.uid, ...newDoc.data() };
                } else {
                    userData = { id: user.uid, ...doc.data() };
                }
                
                // Check if user is active
                if (userData.active === false) {
                    await auth.signOut();
                    window.location.href = 'index.html';
                    return;
                }
                
                currentUser = user;
                
                // Update UI
                document.getElementById('userName').textContent = userData.displayName;
                document.getElementById('walletDisplay').textContent = `$${(userData.wallet || 0).toFixed(2)}`;
                
                // Set up real-time message counter
                setupMessageCounter();
                
                // Load dashboard
                loadDashboard();
                
                // Set up real-time listener for wallet updates
                setupWalletListener();
                
            } catch (error) {
                console.error('Auth error:', error);
                showAlert('Error loading user data', 'error');
            }
        });
        
        // Set up real-time message counter
        function setupMessageCounter() {
            if (messagesListener) {
                messagesListener();
            }
            
            messagesListener = db.collection('messages')
                .where('userId', '==', currentUser.uid)
                .where('read', '==', false)
                .where('fromAdmin', '==', true) // Only count messages from admin
                .onSnapshot((snapshot) => {
                    const unreadCount = snapshot.size;
                    const badge = document.getElementById('unreadMessagesBadge');
                    
                    if (unreadCount > 0) {
                        badge.textContent = unreadCount;
                        badge.style.display = 'inline';
                    } else {
                        badge.style.display = 'none';
                    }
                    
                    // Update user's unread count in database
                    db.collection('users').doc(currentUser.uid).update({
                        unreadMessages: unreadCount
                    }).catch(err => console.error('Error updating unread count:', err));
                    
                }, (error) => {
                    console.error('Message counter error:', error);
                });
        }
        
        // Set up real-time listener for wallet changes
        function setupWalletListener() {
            db.collection('users').doc(currentUser.uid)
                .onSnapshot((doc) => {
                    if (doc.exists) {
                        const newWallet = doc.data().wallet || 0;
                        userData.wallet = newWallet;
                        document.getElementById('walletDisplay').textContent = `$${newWallet.toFixed(2)}`;
                    }
                }, (error) => {
                    console.error('Wallet listener error:', error);
                });
        }
        
        // Load Dashboard Stats
        async function loadDashboard() {
            try {
                // Get fresh user data
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                userData.wallet = userDoc.data().wallet || 0;
                userData.totalFeesPaid = userDoc.data().totalFeesPaid || 0;
                
                // Simple queries without orderBy to avoid index issues
                const pendingSnapshot = await db.collection('submissions')

        // Load Tasks
        async function loadTasks() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading tasks...</p></div>';
                
                // Get all tasks without orderBy to avoid index issues
                const snapshot = await db.collection('tasks').get();
                
                let html = '<h3 style="margin-bottom:1.5rem; color:#1e1e2f;">Available Tasks</h3>';
                
                if (snapshot.empty) {
                    html += `
                        <div class="empty-state">
                            <i class="fas fa-tasks"></i>
                            <h4>No Tasks Available</h4>
                            <p>Check back later for new tasks.</p>
                        </div>
                    `;
                } else {
                    // Convert to array for manual filtering and sorting
                    const tasks = [];
                    snapshot.forEach(doc => {
                        const taskData = doc.data();
                        tasks.push({ 
                            id: doc.id, 
                            ...taskData 
                        });
                    });
                    
                    // Filter active tasks
                    const activeTasks = tasks.filter(task => task.active === true);
                    
                    if (activeTasks.length === 0) {
                        html += `
                            <div class="empty-state">
                                <i class="fas fa-tasks"></i>
                                <h4>No Active Tasks</h4>
                                <p>All tasks are currently inactive.</p>
                            </div>
                        `;
                    } else {
                        // Sort by createdAt if available (newest first)
                        activeTasks.sort((a, b) => {
                            if (!a.createdAt) return 1;
                            if (!b.createdAt) return -1;
                            return (b.createdAt.seconds || 0) - (a.createdAt.seconds || 0);
                        });
                        
                        html += '<div class="task-grid">';
                        
                        for (const task of activeTasks) {
                            // Check if user has already submitted this task
                            const hasSubmitted = await hasUserSubmitted(task.id);
                            
                            // Safely handle reward value
                            let rewardValue = 0;
                            if (task.reward) {
                                rewardValue = parseFloat(task.reward);
                                if (isNaN(rewardValue)) rewardValue = 0;
                            }
                            
                            const title = task.title || 'Untitled Task';
                            const description = task.description || 'No description provided';
                            const category = task.category || 'other';
                            const difficulty = task.difficulty || 'medium';
                            
                            html += `
                                <div class="task-card">
                                    <h4 class="task-title">${title}</h4>
                                    <p style="color:#2d3436; margin-bottom:1rem;">${description.substring(0, 60)}${description.length > 60 ? '...' : ''}</p>
                                    <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap;">
                                        <span class="badge primary">${category}</span>
                                        <span class="badge warning">${difficulty}</span>
                                    </div>
                                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                                        <span class="task-amount">$${rewardValue.toFixed(2)}</span>
                                    </div>
                                    <div style="display:flex; gap:0.5rem; justify-content:space-between;">
                                        <button class="btn btn-secondary" onclick="viewTaskDetails('${task.id}')" style="padding:0.5rem 1rem; flex:1;">
                                            <i class="fas fa-eye"></i> Details
                                        </button>
                                        ${!hasSubmitted ? 
                                            `<button class="btn btn-accept" onclick="acceptTask('${task.id}')" style="flex:2;">
                                                Accept Task
                                            </button>` : 
                                            `<button class="btn btn-success" disabled style="flex:2; opacity:0.6;">
                                                <i class="fas fa-check"></i> Completed
                                            </button>`
                                        }
                                    </div>
                                </div>
                            `;
                        }
                        
                        html += '</div>';
                    }
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading tasks:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <h4>Error Loading Tasks</h4>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadTasks()" style="margin-top:1rem;">Try Again</button>
                    </div>
                `;
            }
        }

        // Check if user has already submitted this task
        async function hasUserSubmitted(taskId) {
            try {
                const snapshot = await db.collection('submissions')
                    .where('userId', '==', currentUser.uid)
                    .where('taskId', '==', taskId)
                    .get();
                
                return !snapshot.empty;
            } catch (error) {
                console.error('Error checking submissions:', error);
                return false;

        // Save Submission
        async function saveSubmission(taskId) {
            const work = document.getElementById('workText').value;
            if (!work) {
                showAlert('Please enter your work', 'error');
                return;
            }
            
            if (work.length < 20) {
                showAlert('Please provide more detailed work (at least 20 characters)', 'error');
                return;
            }
            
            try {
                const hasSubmitted = await hasUserSubmitted(taskId);
                
                if (hasSubmitted) {
                    closeModal();
                    showAlert('You have already submitted this task', 'error');
                    return;
                }
                
                const taskDoc = await db.collection('tasks').doc(taskId).get();
                const task = taskDoc.data();
                
                await db.collection('submissions').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    taskId: taskId,
                    taskTitle: task.title || 'Untitled Task',
                    workText: work,
                    status: 'pending',
                    paidToWallet: false,
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await db.collection('tasks').doc(taskId).update({
                    submissionsCount: firebase.firestore.FieldValue.increment(1)
                });
                
                closeModal();
                showAlert('Submission saved successfully!', 'success');
                
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab')[1].classList.add('active');
                loadSubmissions();
                
            } catch (error) {
                console.error('Error saving submission:', error);
                showAlert('Your work has been submitted successfully. It will be reviewed within 3 hours', 'success');
            }
        }

        // Update fee breakdown
        function updateFeeBreakdown(maxBalance) {
            const amountInput = document.getElementById('withdrawAmount');
            const amount = parseFloat(amountInput.value) || 0;
            const warning = document.getElementById('withdrawWarning');
            const withdrawBtn = document.getElementById('withdrawBtn');
            const feeBreakdown = document.getElementById('feeBreakdown');
            
            if (amount <= 0) {
                feeBreakdown.style.display = 'none';
                warning.style.display = 'none';
                if (withdrawBtn) withdrawBtn.disabled = false;
                return;
            }
            
            const transactionFee = amount * (TRANSACTION_FEE_PERCENT / 100);
            const platformFee = amount * (PLATFORM_FEE_PERCENT / 100);
            const totalFees = transactionFee + platformFee;
            const netAmount = amount - totalFees;
            
            document.getElementById('displayWithdrawAmount').textContent = `$${amount.toFixed(2)}`;
            document.getElementById('displayTransactionFee').textContent = `-$${transactionFee.toFixed(2)}`;
            document.getElementById('displayPlatformFee').textContent = `-$${platformFee.toFixed(2)}`;
            document.getElementById('displayNetAmount').textContent = `$${netAmount.toFixed(2)}`;
            document.getElementById('displayTotalFees').textContent = `$${totalFees.toFixed(2)}`;
            
            if (amount > maxBalance) {
                warning.style.display = 'block';
                if (withdrawBtn) withdrawBtn.disabled = true;
                feeBreakdown.style.display = 'none';
            } else if (amount < 5) {
                warning.textContent = 'Minimum withdrawal amount is $5';
                warning.style.display = 'block';
                if (withdrawBtn) withdrawBtn.disabled = true;
                feeBreakdown.style.display = 'block';
            } else {
                warning.style.display = 'none';
                if (withdrawBtn) withdrawBtn.disabled = false;
                feeBreakdown.style.display = 'block';
            }
        }
        
        // Request Withdrawal
        async function requestWithdrawal() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('withdrawMethod').value;
            const phone = document.getElementById('withdrawPhone').value;
            
            const transactionFee = amount * (TRANSACTION_FEE_PERCENT / 100);
            const platformFee = amount * (PLATFORM_FEE_PERCENT / 100);
            const totalFees = transactionFee + platformFee;
            const netAmount = amount - totalFees;
            
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                const latestBalance = userDoc.data().wallet || 0;
                
                if (!amount || isNaN(amount) || amount <= 0) {
                    showAlert('Please enter a valid amount', 'error');
                    return;
                }
                
                if (amount < 5) {
                    showAlert('Minimum withdrawal is $5', 'error');
                    return;
                }
                
                if (amount > latestBalance) {
                    showAlert(`Insufficient balance. You have $${latestBalance.toFixed(2)} available`, 'error');
                    return;
                }
                
                if (!phone || phone.length < 10) {
                    showAlert('Enter a valid phone number', 'error');
                    return;
                }
                
                const confirmWithdrawal = confirm(
                    `Withdrawal Summary:\n\n` +
                    `Requested Amount: $${amount.toFixed(2)}\n` +
                    `Transaction Fee (${TRANSACTION_FEE_PERCENT}%): -$${transactionFee.toFixed(2)}\n` +
                    `Platform Fee (${PLATFORM_FEE_PERCENT}%): -$${platformFee.toFixed(2)}\n` +
                    `Total Fees: -$${totalFees.toFixed(2)}\n` +
                    `You Will Receive: $${netAmount.toFixed(2)}\n\n` +
                    `Proceed with withdrawal?`
                );
                
                if (!confirmWithdrawal) {
                    return;
                }
                
                const pendingSnapshot = await db.collection('withdrawals')
                    .where('userId', '==', currentUser.uid)
                    .where('status', '==', 'pending')
                    .get();
                
                if (!pendingSnapshot.empty) {
                    showAlert('You already have a pending withdrawal request', 'error');
                    return;
                }
                
                await db.runTransaction(async (transaction) => {
                    const userRef = db.collection('users').doc(currentUser.uid);
                    const userSnap = await transaction.get(userRef);
                    
                    const currentBalance = userSnap.data().wallet || 0;
                    const currentTotalFees = userSnap.data().totalFeesPaid || 0;
                    
                    if (amount > currentBalance) {
                        throw new Error('Insufficient balance');
                    }
                    
                    transaction.update(userRef, {
                        wallet: firebase.firestore.FieldValue.increment(-amount),
                        totalFeesPaid: currentTotalFees + totalFees
                    });
                    
                    const withdrawalRef = db.collection('withdrawals').doc();
                    transaction.set(withdrawalRef, {
                        userId: currentUser.uid,
                        userEmail: currentUser.email,
                        amount: amount,
                        transactionFee: transactionFee,
                        platformFee: platformFee,
                        fees: totalFees,
                        netAmount: netAmount,
                        amountKES: netAmount * 130,
                        method: method,
                        phone: phone,
                        status: 'pending',
                        requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                
                showAlert(`Withdrawal requested successfully! You will receive $${netAmount.toFixed(2)} after fees.`, 'success');
                loadWithdrawals();
                
            } catch (error) {
                console.error('Error requesting withdrawal:', error);
                showAlert(error.message || 'Error requesting withdrawal', 'error');
            }
        }
        
        // Load Messages
        async function loadMessages() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading messages...</p></div>';
                
                // Get all messages for this user
                const snapshot = await db.collection('messages')
                    .where('userId', '==', currentUser.uid)
                    .get();
                
                let html = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h3 style="color:#1e1e2f;">Messages</h3>
                        <button class="btn btn-success" onclick="showComposeMessage()">
                            <i class="fas fa-plus"></i> New Message
                        </button>
                    </div>
                `;
                
                if (snapshot.empty) {
                    html += `
                        <div class="empty-state">
                            <i class="fas fa-envelope-open-text"></i>
                            <h4>No Messages</h4>
                            <p>You don't have any messages yet.</p>
                            <button class="btn btn-primary" onclick="showComposeMessage()" style="margin-top:1rem;">
                                <i class="fas fa-pen"></i> Send your first message
                            </button>
                        </div>
                    `;
                } else {
                    // Group messages by thread (using parentMessageId or id)
                    const messages = [];
                    snapshot.forEach(doc => {
                        messages.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // Sort by createdAt (newest first)
                    messages.sort((a, b) => {
                        if (!a.createdAt) return 1;
                        if (!b.createdAt) return -1;
                        return (b.createdAt.seconds || 0) - (a.createdAt.seconds || 0);
                    });
                    
                    // Group messages into threads
                    const threads = {};
                    messages.forEach(msg => {
                        const threadId = msg.parentMessageId || msg.id;
                        if (!threads[threadId]) {
                            threads[threadId] = {
                                id: threadId,
                                messages: [],
                                unreadCount: 0,
                                lastMessage: msg
                            };
                        }
                        threads[threadId].messages.push(msg);
                        if (!msg.read && msg.fromAdmin) {
                            threads[threadId].unreadCount++;
                        }
                        
                        // Sort messages within thread by date
                        threads[threadId].messages.sort((a, b) => {
                            if (!a.createdAt) return 1;
                            if (!b.createdAt) return -1;
                            return (a.createdAt.seconds || 0) - (b.createdAt.seconds || 0);
                        });
                        
                        // Update last message
                        const lastMsg = threads[threadId].messages[threads[threadId].messages.length - 1];
                        threads[threadId].lastMessage = lastMsg;
                    });
                    
                    // Convert threads to array and sort by last message date
                    const threadList = Object.values(threads);
                    threadList.sort((a, b) => {
                        const aDate = a.lastMessage.createdAt?.seconds || 0;
                        const bDate = b.lastMessage.createdAt?.seconds || 0;
                        return bDate - aDate;
                    });
                    
                    html += '<div style="display:flex; flex-direction:column; gap:1rem;">';
                    
                    for (const thread of threadList) {
                        const lastMsg = thread.lastMessage;
                        const hasUnread = thread.unreadCount > 0;
                        
                        let msgDate = 'N/A';
                        if (lastMsg.createdAt && lastMsg.createdAt.seconds) {
                            const date = new Date(lastMsg.createdAt.seconds * 1000);
                            const now = new Date();
                            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
                            
                            if (diffDays === 0) {
                                msgDate = 'Today';
                            } else if (diffDays === 1) {
                                msgDate = 'Yesterday';
                            } else if (diffDays < 7) {
                                msgDate = `${diffDays} days ago`;
                            } else {
                                msgDate = date.toLocaleDateString();
                            }
                        }
                        
                        // Get subject from first message or last message
                        const firstMsg = thread.messages[0];
                        const subject = firstMsg.subject || 'Conversation with Admin';
                        
                        // Get message preview
                        const preview = lastMsg.message?.substring(0, 60) || 'No content';
                        const messageCount = thread.messages.length;
                        
                        html += `
                            <div class="submission-card message-card ${hasUnread ? 'unread' : ''}" onclick="viewMessageThread('${thread.id}')">
                                <div style="display:flex; justify-content:space-between; align-items:start;">
                                    <div style="flex:1;">
                                        <div class="message-preview">
                                            <span class="message-subject ${hasUnread ? 'unread' : ''}" style="${hasUnread ? 'color:#FF6B6B;' : ''}">
                                                ${subject}
                                                ${hasUnread ? `<span class="unread-badge">${thread.unreadCount} new</span>` : ''}
                                            </span>
                                            <span style="font-size:0.85rem; color:#4a5568;">
                                                <i class="far fa-clock"></i> ${msgDate}
                                            </span>
                                        </div>
                                        <div class="message-excerpt">
                                            ${preview}${preview.length >= 60 ? '...' : ''}
                                        </div>
                                        <div style="display:flex; gap:1rem; margin-top:0.5rem; font-size:0.8rem; color:#4a5568;">
                                            <span><i class="far fa-comment"></i> ${messageCount} message${messageCount !== 1 ? 's' : ''}</span>
                                            <span>
                                                <i class="fas ${lastMsg.fromAdmin ? 'fa-user-shield' : 'fa-user'}"></i>
                                                Last: ${lastMsg.fromAdmin ? 'Admin' : 'You'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    
                    html += '</div>';
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading messages:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <h4>Error Loading Messages</h4>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadMessages()" style="margin-top:1rem;">Try Again</button>
                    </div>
                `;
            }
        }
        
        // Show compose message form
        function showComposeMessage() {
            showModal(`
                <h3 style="margin-bottom:1rem; color:#10b981;">New Message</h3>
                <p style="margin-bottom:1rem; color:#4a5568;">Send a message to admin. We'll respond as soon as possible.</p>
                
                <div style="margin-bottom:1rem;">
                    <label style="font-weight:600; margin-bottom:0.3rem; display:block; color:#1e1e2f;">Subject</label>
                    <input type="text" id="messageSubject" placeholder="e.g., Question about withdrawal, Task issue, etc.">
                </div>
                
                <div style="margin-bottom:1rem;">
                    <label style="font-weight:600; margin-bottom:0.3rem; display:block; color:#1e1e2f;">Message</label>
                    <textarea id="messageContent" class="submit-textbox" placeholder="Type your message here..." style="min-height:150px;"></textarea>
                </div>
                
                <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                    <button class="btn btn-success" style="flex:2;" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                    <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Cancel</button>
                </div>
                
                <p style="font-size:0.85rem; color:#4a5568; margin-top:1rem; text-align:center;">
                    <i class="fas fa-info-circle"></i> 
                    Messages are typically responded to within 24 hours.
                </p>
            `);
        }
        
        // Send new message
        async function sendMessage() {
            const subject = document.getElementById('messageSubject')?.value;
            const message = document.getElementById('messageContent')?.value;
            
            if (!subject || !subject.trim()) {
                showAlert('Please enter a subject', 'error');
                return;
            }
            
            if (!message || !message.trim()) {
                showAlert('Please enter your message', 'error');
                return;
            }
            
            if (message.length < 10) {
                showAlert('Message must be at least 10 characters', 'error');
                return;
            }
            
            try {
                // Create the message
                const messageData = {
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userDisplayName: userData.displayName || 'User',
                    subject: subject.trim(),
                    message: message.trim(),
                    fromAdmin: false,
                    read: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'sent'
                };
                
                const docRef = await db.collection('messages').add(messageData);
                
                // Also create a thread reference
                await db.collection('messages').doc(docRef.id).update({
                    parentMessageId: docRef.id // Self-reference as parent for threading
                });
                
                closeModal();
                showAlert('Message sent successfully!', 'success');
                
                // Refresh messages
                loadMessages();
                
            } catch (error) {
                console.error('Error sending message:', error);
                showAlert('Your message has been sent successfully', 'success');
            }
        }
        
        // View message thread
        async function viewMessageThread(threadId) {
            try {
                // Get all messages in this thread
                const snapshot = await db.collection('messages')
                    .where('parentMessageId', '==', threadId)
                    .orderBy('createdAt', 'asc')
                    .get();
                
                if (snapshot.empty) {
                    showAlert('Message thread not found. Please create a new message', 'error');
                    return;
                }
                
                const messages = [];
                snapshot.forEach(doc => {
                    messages.push({ id: doc.id, ...doc.data() });
                });
                
                // Get thread subject from first message
                const firstMessage = messages[0];
                const subject = firstMessage.subject || 'Conversation';
                
                // Mark admin messages as read
                const unreadMessages = messages.filter(m => m.fromAdmin && !m.read);
                for (const msg of unreadMessages) {
                    await db.collection('messages').doc(msg.id).update({
                        read: true,
                        readAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                // Build thread HTML
                let threadHtml = `
                    <h3 style="margin-bottom:1rem; color:#10b981;">${subject}</h3>
                    <div class="message-thread" id="messageThread">
                `;
                
                for (const msg of messages) {
                    let msgDate = 'N/A';
                    if (msg.createdAt && msg.createdAt.seconds) {
                        msgDate = new Date(msg.createdAt.seconds * 1000).toLocaleString();
                    }
                    
                    const sender = msg.fromAdmin ? 'Admin' : 'You';
                    const senderClass = msg.fromAdmin ? 'admin' : 'user';
                    
                    threadHtml += `
                        <div class="message-bubble ${senderClass}">
                            <div class="message-header ${senderClass}">
                                <span>${sender}</span>
                                <span class="message-time">${msgDate}</span>
                            </div>
                            <div class="message-content">
                                ${msg.message.replace(/\n/g, '<br>')}
                            </div>
                            ${!msg.fromAdmin ? `
                                <div class="message-status ${msg.read ? 'read' : 'unread'}">
                                    ${msg.read ? 'Read' : 'Delivered'}
                                    <i class="fas ${msg.read ? 'fa-check-double' : 'fa-check'}"></i>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                
                threadHtml += `
                    </div>
                    
                    <div class="compose-area">
                        <h4 style="margin-bottom:0.5rem; color:#1e1e2f;">Reply</h4>
                        <textarea id="replyMessage" class="message-input" placeholder="Type your reply here..."></textarea>
                        <div style="display:flex; gap:0.5rem;">
                            <button class="btn btn-success" style="flex:2;" onclick="sendReply('${threadId}')">
                                <i class="fas fa-reply"></i> Send Reply
                            </button>
                            <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Close</button>
                        </div>
                    </div>
                `;
                
                showModal(threadHtml);
                
                // Scroll to bottom of thread
                setTimeout(() => {
                    const thread = document.getElementById('messageThread');
                    if (thread) {
                        thread.scrollTop = thread.scrollHeight;
                    }
                }, 100);
                
            } catch (error) {
                console.error('Error loading message thread:', error);
                showAlert('Error loading message thread', 'error');
            }
        }
        
        // Send reply in thread
        async function sendReply(threadId) {
            const reply = document.getElementById('replyMessage')?.value;
            
            if (!reply || !reply.trim()) {
                showAlert('Please enter your reply', 'error');
                return;
            }
            
            if (reply.length < 5) {
                showAlert('Reply must be at least 5 characters', 'error');
                return;
            }
            
            try {
                // Get the first message to get subject
                const firstMsgSnapshot = await db.collection('messages')
                    .where('parentMessageId', '==', threadId)
                    .orderBy('createdAt', 'asc')
                    .limit(1)
                    .get();
                
                const firstMsg = firstMsgSnapshot.docs[0]?.data();
                
                // Create reply
                await db.collection('messages').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userDisplayName: userData.displayName || 'User',
                    parentMessageId: threadId,
                    subject: firstMsg?.subject || 'Re: Conversation',
                    message: reply.trim(),
                    fromAdmin: false,
                    read: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'sent'
                });
                
                // Refresh the thread
                closeModal();
                viewMessageThread(threadId);
                showAlert('Reply sent successfully!', 'success');
                
            } catch (error) {
                console.error('Error sending reply:', error);
                showAlert('Error sending reply', 'error');
            }
        }
        
        // Load Profile
        function loadProfile() {
            const joinDate = userData.createdAt && userData.createdAt.seconds ? 
                new Date(userData.createdAt.seconds * 1000).toLocaleDateString() : 'N/A';
            
            document.getElementById('content').innerHTML = `
                <h3 style="margin-bottom:1.5rem; color:#1e1e2f;">Profile Settings</h3>
                <div style="background:linear-gradient(145deg, #F9FAFB, #F3F4F6); border-radius:1.5rem; padding:1.5rem;">
                    <input type="text" id="profileName" value="${userData.displayName || ''}" placeholder="Display Name">
                    <input type="tel" id="profilePhone" value="${userData.phone || ''}" placeholder="Phone Number">
                    <button class="btn btn-primary" style="width:100%;" onclick="updateProfile()">Update Profile</button>
                </div>
                <div style="margin-top:1rem; padding:1.5rem; background:linear-gradient(145deg, #F9FAFB, #F3F4F6); border-radius:1rem;">
                    <p><strong style="color:#1e1e2f;">Email:</strong> <span style="color:#4a5568;">${userData.email}</span></p>
                    <p><strong style="color:#1e1e2f;">Member since:</strong> <span style="color:#4a5568;">${joinDate}</span></p>
                    <p><strong style="color:#1e1e2f;">Wallet Balance:</strong> <span style="color:#10b981; font-weight:700;">$${(userData.wallet || 0).toFixed(2)}</span></p>
                    <p><strong style="color:#1e1e2f;">Total Fees Paid:</strong> <span style="color:#FF6B6B; font-weight:700;">$${(userData.totalFeesPaid || 0).toFixed(2)}</span></p>
                    <p><strong style="color:#1e1e2f;">Membership:</strong> 
                        <span class="${userData.membershipPaid ? 'premium-badge' : 'badge warning'}">
                            ${userData.membershipPaid ? 'Premium' : 'Free'}
                        </span>
                    </p>
                </div>
            `;
        }
        
        // Update Profile
        async function updateProfile() {
            const name = document.getElementById('profileName').value;
            const phone = document.getElementById('profilePhone').value;
            
            if (!name) {
                showAlert('Name is required', 'error');
                return;
            }
            
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    displayName: name,
                    phone: phone || ''
                });
                
                userData.displayName = name;
                userData.phone = phone;
                document.getElementById('userName').textContent = name;
                
                showAlert('Profile updated successfully!', 'success');
                
            } catch (error) {
                console.error('Error updating profile:', error);
                showAlert('Error updating profile', 'error');
            }
        }
        
        // Show Membership Payment
        function showMembershipPayment() {
            showModal(`
                <h3 style="margin-bottom:1rem; color:#1e1e2f;">Premium Membership</h3>
                <p style="margin-bottom:1rem; color:#4a5568;">Upgrade to premium for only <strong style="color:#10b981;">$3/Annually</strong></p>

                    <p style="color:#4a5568;">1. Visit <a href="https://lipana.dev/pay/nextgen-membership" target="_blank" style="color:#667EEA;">lipwa.com</a></p>

                    <p style="color:#4a5568;">3. Copy the transaction ID</p>

                <input type="text" id="transactionCode" placeholder="Enter Lipwa Transaction ID">

            `);

        // Submit Payment Proof
        async function submitPaymentProof() {
            const code = document.getElementById('transactionCode').value;
            if (!code) {
                showAlert('Enter transaction ID', 'error');
                return;
            }
            
            try {
                await db.collection('membershipPayments').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    transactionCode: code,
                    status: 'pending',
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await db.collection('users').doc(currentUser.uid).update({
                    membershipStatus: 'pending'
                });
                
                closeModal();
                showAlert('Payment proof submitted for review!', 'success');
                
            } catch (error) {
                console.error('Error submitting payment:', error);
                showAlert('Error submitting payment', 'error');
            }
        }
    </script>
