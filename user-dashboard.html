    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",
            authDomain: "nextgen-5fb6f.firebaseapp.com",
            projectId: "nextgen-5fb6f",
            storageBucket: "nextgen-5fb6f.firebasestorage.app",
            messagingSenderId: "100132076455",
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const MEMBERSHIP_TYPES = { BASIC: 'basic', PREMIUM: 'premium', ELITE: 'elite' };
        
        const DEFAULT_MEMBERSHIP_PACKAGES = {
            basic: { name: 'BASIC', price: 0, duration: 'lifetime', features: [
                { text: 'Access to all tasks', included: true, icon: 'fa-check-circle' },
                { text: 'Withdrawals', included: false, icon: 'fa-times-circle' },
                { text: 'Welcome bonus', included: false, icon: 'fa-times-circle' },
                { text: 'Standard support', included: true, icon: 'fa-check-circle' },
                { text: 'Task submissions', included: true, icon: 'fa-check-circle' }
            ], color: '#94a3b8', buttonClass: 'basic', badge: null },
            premium: { name: 'PREMIUM', price: 3, duration: 'annual', features: [
                { text: 'Access to all tasks', included: true, icon: 'fa-check-circle' },
                { text: 'Withdrawals enabled', included: true, icon: 'fa-check-circle', highlight: true },
                { text: 'Priority support', included: true, icon: 'fa-star' },
                { text: 'Higher earning potential', included: true, icon: 'fa-chart-line' },
                { text: 'Premium badge', included: true, icon: 'fa-gem' }
            ], color: '#6366f1', buttonClass: 'premium', badge: 'popular' },
            elite: { name: 'ELITE', price: 6, duration: 'lifetime', features: [
                { text: 'Access to all tasks', included: true, icon: 'fa-check-circle' },
                { text: 'Withdrawals enabled', included: true, icon: 'fa-check-circle', highlight: true },
                { text: 'Welcome bonus', included: true, icon: 'fa-gift', highlight: true, bonus: true },
                { text: 'VIP support 24/7', included: true, icon: 'fa-star' },
                { text: 'Elite status & perks', included: true, icon: 'fa-trophy' },
                { text: 'Reduced fees (coming soon)', included: true, icon: 'fa-percent' }
            ], color: '#f59e0b', buttonClass: 'elite', badge: 'best-value', welcomeBonus: 10 }
        };
        
        const DEFAULT_FEE_SETTINGS = {
            exchangeRate: 130,
            maxWithdrawsPerDay: 1000,
            maxWithdrawalsPerDay: 1000,
            minimumWithdrawals: 5,
            platformFeePercent: 2,
            transactionFeePercent: 3,
            withdrawalsMethods: ['M-Pesa', 'Airtel Money', 'Bank Transfer']
        };
        
        const REFERRAL_BONUS_REFERRER = 2;
        const REFERRAL_BONUS_REFERRED = 0.5;
        
        let membershipPackages = null;
        let feeSettings = null;
        let currentUser = null;
        let userData = null;
        let messagesListener = null;
        
        db.enablePersistence().catch(err => console.log('Persistence error:', err));
        
        async function loadMembershipPackages() {
            try {
                const doc = await db.collection('settings').doc('membershipPackages').get();
                if (doc.exists) membershipPackages = doc.data();
                else {
                    membershipPackages = DEFAULT_MEMBERSHIP_PACKAGES;
                    await db.collection('settings').doc('membershipPackages').set(DEFAULT_MEMBERSHIP_PACKAGES);
                }
            } catch (error) {
                console.error('Error loading membership packages:', error);
                membershipPackages = DEFAULT_MEMBERSHIP_PACKAGES;
            }
            return membershipPackages;
        }
        
        // IMPORTANT: Using 'feesSettings' (with 's') to match your database
        async function loadFeeSettings() {
            try {
                const doc = await db.collection('settings').doc('feesSettings').get();
                if (doc.exists) {
                    feeSettings = doc.data();
                    console.log('Loaded fee settings:', feeSettings);
                } else {
                    feeSettings = DEFAULT_FEE_SETTINGS;
                    await db.collection('settings').doc('feesSettings').set(DEFAULT_FEE_SETTINGS);
                }
            } catch (error) {
                console.error('Error loading fee settings:', error);
                feeSettings = DEFAULT_FEE_SETTINGS;
            }
            return feeSettings;
        }
        
        function getPackageByType(type) {
            if (!membershipPackages) return DEFAULT_MEMBERSHIP_PACKAGES[type] || DEFAULT_MEMBERSHIP_PACKAGES.basic;
            return membershipPackages[type] || DEFAULT_MEMBERSHIP_PACKAGES[type] || DEFAULT_MEMBERSHIP_PACKAGES.basic;
        }
        
        function getWelcomeBonus(type) {
            if (type !== MEMBERSHIP_TYPES.ELITE) return 0;
            const pkg = getPackageByType(type);
            return pkg.welcomeBonus || 10;
        }
        
        function toggleMobileMenu() {
            document.getElementById('mobileNav').classList.toggle('active');
            document.getElementById('mobileNavOverlay').classList.toggle('active');
        }
        
        function closeMobileMenu() {
            document.getElementById('mobileNav').classList.remove('active');
            document.getElementById('mobileNavOverlay').classList.remove('active');
        }
        
        function handleMobileNavClick(tab) {
            closeMobileMenu();
            switchTab(tab);
            document.querySelectorAll('.mobile-nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
        
        function showAlert(message, type = 'error') {
            const d = document.getElementById('alertDialog');
            const o = document.getElementById('overlay');
            document.getElementById('alertIcon').className = 'fas ' + (type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle');
            document.getElementById('alertTitle').textContent = type === 'error' ? 'Error!' : 'Success!';
            document.getElementById('alertMessage').textContent = message;
            d.className = 'alert-dialog ' + type;
            d.classList.add('show');
            o.classList.add('show');
        }
        
        function hideAlert() {
            document.getElementById('alertDialog').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
        
        function showModal(html) {
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('modalBackdrop').classList.remove('active');
        }
        
        document.getElementById('modalBackdrop').addEventListener('click', closeModal);
        
        function logout() {
            if (messagesListener) messagesListener();
            auth.signOut();
            window.location.href = 'index.html';
        }
        
        function generateReferralCode(userId) { return userId.substring(0, 8).toUpperCase(); }
        function getReferralLink() { return `https://nextgen.joblify.top/signup/${generateReferralCode(currentUser.uid)}`; }
        
        function copyReferralLink() {
            navigator.clipboard.writeText(getReferralLink()).then(() => showAlert('Referral link copied!', 'success')).catch(() => showAlert('Failed to copy', 'error'));
        }
        
        function copyToClipboardDynamic(text) {
            navigator.clipboard.writeText(text).then(() => showAlert('Copied!', 'success')).catch(() => showAlert('Failed to copy', 'error'));
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            let found = false;
            document.querySelectorAll('.tab').forEach(t => {
                if (t.textContent.toLowerCase().includes(tab) || 
                    (tab === 'tasks' && t.textContent.includes('Available')) ||
                    (tab === 'submissions' && t.textContent.includes('Submissions')) ||
                    (tab === 'withdrawals' && t.textContent.includes('Withdrawals')) ||
                    (tab === 'referrals' && t.textContent.includes('Referrals')) ||
                    (tab === 'messages' && t.textContent.includes('Messages')) ||
                    (tab === 'profile' && t.textContent.includes('Profile'))) {
                    t.classList.add('active');
                    found = true;
                }
            });
            if (!found) document.querySelector('.tab').classList.add('active');
            
            document.querySelectorAll('.mobile-nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.mobile-nav-item').forEach(i => {
                if (i.querySelector('span')?.textContent.toLowerCase().includes(tab)) i.classList.add('active');
            });
            
            if (tab === 'tasks') loadTasks();
            else if (tab === 'submissions') loadSubmissions();
            else if (tab === 'withdrawals') loadWithdrawals();
            else if (tab === 'referrals') loadReferrals();
            else if (tab === 'messages') loadMessages();
            else if (tab === 'profile') loadProfile();
            else loadTasks();
        }
        
        function isDeadlinePassed(deadline) {
            if (!deadline) return false;
            return new Date() > (deadline.toDate ? deadline.toDate() : new Date(deadline));
        }
        
        function formatDeadline(deadline) {
            if (!deadline) return 'No deadline';
            const date = deadline.toDate ? deadline.toDate() : new Date(deadline);
            const diff = date - new Date();
            if (diff < 0) return 'Expired';
            const days = Math.ceil(diff / (1000*60*60*24));
            if (days > 7) return date.toLocaleDateString();
            if (days > 1) return `${days} days left`;
            if (days === 1) return '1 day left';
            return `${Math.ceil(diff / (1000*60*60))} hours left`;
        }
        
        function getDeadlineClass(deadline) {
            if (!deadline) return '';
            const diff = (deadline.toDate ? deadline.toDate() : new Date(deadline)) - new Date();
            if (diff < 0) return 'expired';
            if (diff < 86400000) return 'urgent';
            return 'upcoming';
        }
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
            if (!user.emailVerified && !isGoogle) { window.location.href = 'index.html'; return; }
            
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const referralCode = urlParams.get('ref');
                    let referredBy = null;
                    if (referralCode) {
                        const users = await db.collection('users').get();
                        for (const u of users.docs) {
                            if (generateReferralCode(u.id) === referralCode) { referredBy = u.id; break; }
                        }
                    }
                    await db.collection('users').doc(user.uid).set({
                        email: user.email, displayName: user.displayName || 'User', phone: '', role: 'user',
                        wallet: 0, active: true, verified: user.emailVerified || isGoogle,
                        membershipType: MEMBERSHIP_TYPES.BASIC, membershipPaid: false, membershipStatus: 'active',
                        membershipExpiry: null, totalFeesPaid: 0, unreadMessages: 0, referredBy: referredBy,
                        totalReferrals: 0, referralEarnings: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    if (referredBy) await db.collection('referrals').add({ referrerId: referredBy, referredId: user.uid, referredEmail: user.email, status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    const nd = await db.collection('users').doc(user.uid).get();
                    userData = { id: user.uid, ...nd.data() };
                } else {
                    userData = { id: user.uid, ...doc.data() };
                    const welcomeBonus = getWelcomeBonus(MEMBERSHIP_TYPES.ELITE);
                    if (userData.membershipType === MEMBERSHIP_TYPES.ELITE && !userData.eliteBonusApplied) {
                        await db.collection('users').doc(user.uid).update({ wallet: firebase.firestore.FieldValue.increment(welcomeBonus), eliteBonusApplied: true });
                        userData.wallet = (userData.wallet || 0) + welcomeBonus;
                    }
                }
                if (userData.active === false) { await auth.signOut(); window.location.href = 'index.html'; return; }
                
                currentUser = user;
                document.getElementById('userName').textContent = userData.displayName;
                document.getElementById('walletDisplay').textContent = `$${(userData.wallet || 0).toFixed(2)}`;
                
                setupMessageCounter();
                await loadMembershipPackages();
                await loadFeeSettings();
                loadDashboard();
                setupWalletListener();
            } catch (error) { console.error('Auth error:', error); showAlert('Error loading user data', 'error'); }
        });
        
        function setupMessageCounter() {
            if (messagesListener) messagesListener();
            messagesListener = db.collection('messages').where('userId', '==', currentUser.uid).where('read', '==', false).where('fromAdmin', '==', true)
                .onSnapshot((s) => {
                    const c = s.size;
                    const b = document.getElementById('unreadMessagesBadge');
                    const mb = document.getElementById('mobileUnreadBadge');
                    if (c > 0) {
                        if (b) { b.textContent = c; b.style.display = 'inline'; }
                        if (mb) { mb.textContent = c; mb.style.display = 'inline'; }
                    } else {
                        if (b) b.style.display = 'none';
                        if (mb) mb.style.display = 'none';
                    }
                    db.collection('users').doc(currentUser.uid).update({ unreadMessages: c }).catch(() => {});
                }, (e) => console.error('Message counter error:', e));
        }
        
        function setupWalletListener() {
            db.collection('users').doc(currentUser.uid).onSnapshot((d) => {
                if (d.exists) {
                    userData.wallet = d.data().wallet || 0;
                    document.getElementById('walletDisplay').textContent = `$${userData.wallet.toFixed(2)}`;
                }
            }, (e) => console.error('Wallet listener error:', e));
        }
        
        async function loadDashboard() {
            try {
                const u = await db.collection('users').doc(currentUser.uid).get();
                userData.wallet = u.data().wallet || 0;
                userData.totalFeesPaid = u.data().totalFeesPaid || 0;
                userData.membershipType = u.data().membershipType || MEMBERSHIP_TYPES.BASIC;
                userData.totalReferrals = u.data().totalReferrals || 0;
                userData.referralEarnings = u.data().referralEarnings || 0;
                
                const p = await db.collection('submissions').where('userId', '==', currentUser.uid).where('status', '==', 'pending').get();
                const a = await db.collection('submissions').where('userId', '==', currentUser.uid).where('status', '==', 'approved').get();
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><i class="fas fa-wallet"></i><div class="stat-value">$${(userData.wallet||0).toFixed(2)}</div><div class="stat-label">Balance</div></div>
                    <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-value">${p.size}</div><div class="stat-label">Pending</div></div>
                    <div class="stat-card"><i class="fas fa-check-circle"></i><div class="stat-value">${a.size}</div><div class="stat-label">Approved</div></div>
                    <div class="stat-card"><i class="fas fa-users"></i><div class="stat-value">${userData.totalReferrals||0}</div><div class="stat-label">Referrals</div></div>
                `;
                document.getElementById('walletDisplay').textContent = `$${(userData.wallet||0).toFixed(2)}`;
                switchTab('tasks');
            } catch (e) {
                console.error('Error loading dashboard:', e);
                document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><i class="fas fa-wallet"></i><div class="stat-value">$${(userData.wallet||0).toFixed(2)}</div><div class="stat-label">Balance</div></div>`;
                switchTab('tasks');
            }
        }
        
        async function loadTasks() {
            document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading tasks...</p></div>';
            try {
                const s = await db.collection('tasks').get();
                let html = '<h3 style="margin-bottom:2rem;">Available Tasks</h3>';
                if (s.empty) html += '<div class="empty-state"><i class="fas fa-tasks"></i><h4>No Tasks Available</h4><p>Check back later.</p></div>';
                else {
                    const tasks = []; s.forEach(d => tasks.push({ id: d.id, ...d.data() }));
                    const active = tasks.filter(t => t.active === true);
                    if (active.length === 0) html += '<div class="empty-state"><i class="fas fa-tasks"></i><h4>No Active Tasks</h4><p>All tasks are inactive.</p></div>';
                    else {
                        active.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
                        html += '<div class="task-grid">';
                        for (const t of active) {
                            const has = await hasUserSubmitted(t.id);
                            const passed = isDeadlinePassed(t.deadline);
                            html += `
                                <div class="task-card">

        async function saveSubmission(taskId) {
            const w = document.getElementById('workText').value;
            if (!w) { showAlert('Please enter your work', 'error'); return; }
            if (w.length < 20) { showAlert('Please provide more detail (at least 20 characters)', 'error'); return; }
            try {
                const t = await db.collection('tasks').doc(taskId).get();
                const task = t.data();
                if (isDeadlinePassed(task.deadline)) { showAlert('Task expired', 'error'); closeModal(); return; }
                if (await hasUserSubmitted(taskId)) { closeModal(); showAlert('Already submitted', 'error'); return; }
                await db.collection('submissions').add({ userId: currentUser.uid, userEmail: currentUser.email, taskId, taskTitle: task.title||'Untitled', workText: w, status: 'pending', paidToWallet: false, submittedAt: firebase.firestore.FieldValue.serverTimestamp() });
                await db.collection('tasks').doc(taskId).update({ submissionsCount: firebase.firestore.FieldValue.increment(1) });
                closeModal(); showAlert('Submission saved!', 'success'); switchTab('submissions');
            } catch (e) { console.error('Error saving submission:', e); showAlert('Submission received, will be reviewed soon', 'success'); switchTab('submissions'); }

        function updateFeeBreakdown(maxBalance) {
            const amt = document.getElementById('withdrawAmount');
            if (!amt) return;
            const amount = parseFloat(amt.value) || 0;
            const warn = document.getElementById('withdrawWarning');
            const btn = document.getElementById('withdrawBtn');
            const fb = document.getElementById('feeBreakdown');
            
            const tf = feeSettings?.transactionFeePercent || 3;
            const pf = feeSettings?.platformFeePercent || 2;
            const ex = feeSettings?.exchangeRate || 130;
            const min = feeSettings?.minimumWithdrawals || 5;
            
            if (amount <= 0) { if (fb) fb.style.display = 'none'; if (warn) warn.style.display = 'none'; if (btn) btn.disabled = false; return; }
            
            const tFee = amount * (tf/100);
            const pFee = amount * (pf/100);
            const total = tFee + pFee;
            const net = amount - total;
            const kes = net * ex;
            
            document.getElementById('displayWithdrawAmount').textContent = `$${amount.toFixed(2)}`;
            document.getElementById('displayTransactionFee').textContent = `-$${tFee.toFixed(2)}`;
            document.getElementById('displayPlatformFee').textContent = `-$${pFee.toFixed(2)}`;
            document.getElementById('displayNetAmount').textContent = `$${net.toFixed(2)}`;
            document.getElementById('displayTotalFees').textContent = `$${total.toFixed(2)}`;
            document.getElementById('displayKES').textContent = kes.toFixed(2);
            
            if (amount > maxBalance) { warn.style.display = 'block'; warn.textContent = 'Amount exceeds balance!'; if (btn) btn.disabled = true; if (fb) fb.style.display = 'none'; }
            else if (amount < min) { warn.textContent = `Minimum is $${min}`; warn.style.display = 'block'; if (btn) btn.disabled = true; if (fb) fb.style.display = 'block'; }
            else { warn.style.display = 'none'; if (btn) btn.disabled = false; if (fb) fb.style.display = 'block'; }
        }
        
        async function requestWithdrawal() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('withdrawMethod').value;
            const phone = document.getElementById('withdrawPhone').value;
            
            const tf = feeSettings?.transactionFeePercent || 3;
            const pf = feeSettings?.platformFeePercent || 2;
            const ex = feeSettings?.exchangeRate || 130;
            const min = feeSettings?.minimumWithdrawals || 5;
            
            const tFee = amount * (tf/100);
            const pFee = amount * (pf/100);
            const total = tFee + pFee;
            const net = amount - total;
            const kes = net * ex;
            
            try {
                const u = await db.collection('users').doc(currentUser.uid).get();
                const bal = u.data().wallet || 0;
                
                if (!amount || amount <= 0) { showAlert('Enter a valid amount', 'error'); return; }
                if (amount < min) { showAlert(`Minimum is $${min}`, 'error'); return; }
                if (amount > bal) { showAlert(`Insufficient balance. You have $${bal.toFixed(2)}`, 'error'); return; }
                if (!phone || phone.length < 10) { showAlert('Enter a valid phone number', 'error'); return; }
                if (userData.membershipType === MEMBERSHIP_TYPES.BASIC) { showAlert('Upgrade to Premium or Elite to withdraw', 'error'); return; }
                
                if (!confirm(`Withdrawal Summary:\nRequested: $${amount.toFixed(2)}\nFees: -$${total.toFixed(2)}\nYou Receive: $${net.toFixed(2)}\nKES: ${kes.toFixed(2)}\n\nProceed?`)) return;
                
                const p = await db.collection('withdrawals').where('userId','==',currentUser.uid).where('status','==','pending').get();
                if (!p.empty) { showAlert('You have a pending withdrawal', 'error'); return; }
                
                await db.runTransaction(async (tx) => {
                    const ref = db.collection('users').doc(currentUser.uid);
                    const snap = await tx.get(ref);
                    const curBal = snap.data().wallet || 0;
                    const curFees = snap.data().totalFeesPaid || 0;
                    if (amount > curBal) throw new Error('Insufficient balance');
                    tx.update(ref, { wallet: firebase.firestore.FieldValue.increment(-amount), totalFeesPaid: curFees + total });
                    const wref = db.collection('withdrawals').doc();
                    tx.set(wref, { userId: currentUser.uid, userEmail: currentUser.email, amount, transactionFee: tFee, platformFee: pFee, fees: total, netAmount: net, amountKES: kes, method, phone, status: 'pending', requestedAt: firebase.firestore.FieldValue.serverTimestamp() });
                });
                
                showAlert(`Withdrawal requested! You'll receive $${net.toFixed(2)}`, 'success');
                loadWithdrawals();
            } catch (e) { console.error('Error requesting withdrawal:', e); showAlert(e.message || 'Error requesting withdrawal', 'error'); }
        }
        
        async function loadReferrals() {
            document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading referrals...</p></div>';
            try {
                const u = await db.collection('users').doc(currentUser.uid).get();
                const code = generateReferralCode(currentUser.uid);
                const link = getReferralLink();
                
                let ref = { empty: true, docs: [] };
                try { ref = await db.collection('users').where('referredBy','==',currentUser.uid).get(); } catch (e) { console.warn('Could not fetch referred users:', e); }
                
                let bon = { empty: true, docs: [] };
                try { bon = await db.collection('referralBonuses').where('referrerId','==',currentUser.uid).orderBy('createdAt','desc').get(); } catch (e) { console.warn('Could not fetch referral bonuses:', e); }
                
                const totalRef = ref.size;
                let totalEarned = 0, bonuses = [];
                if (!bon.empty) bon.forEach(d => { let b = d.data(); totalEarned += b.amount; bonuses.push({ id: d.id, ...b }); });
                
                userData.totalReferrals = totalRef;
                userData.referralEarnings = totalEarned;
                
                let html = `
                    <div class="referral-section"><div class="referral-header"><i class="fas fa-users"></i><h3>Referral Program</h3></div>
                    <div class="referral-stats"><div class="referral-stat-card"><div class="referral-stat-value">${totalRef}</div><div class="referral-stat-label">Total Referrals</div></div><div class="referral-stat-card"><div class="referral-stat-value">$${totalEarned.toFixed(2)}</div><div class="referral-stat-label">Earned</div></div><div class="referral-stat-card"><div class="referral-stat-value">$${REFERRAL_BONUS_REFERRER}</div><div class="referral-stat-label">Per Premium</div></div></div>
                    <div style="margin:2rem 0;"><h4 style="margin-bottom:1rem;">Your Referral Link</h4><div class="referral-link-box"><input type="text" id="referralLink" value="${link}" readonly><button onclick="copyReferralLink()"><i class="fas fa-copy"></i> Copy</button></div><div class="referral-info"><div class="referral-info-item"><i class="fas fa-check-circle"></i><span>You get <strong>$${REFERRAL_BONUS_REFERRER}</strong> when referred upgrades to Premium</span></div><div class="referral-info-item"><i class="fas fa-check-circle"></i><span>Referred gets <strong>$${REFERRAL_BONUS_REFERRED}</strong></span></div></div></div></div>
                    <h4 style="margin-bottom:1rem;">Your Referrals</h4>
                `;
                
                if (ref.empty) html += '<div class="empty-state"><i class="fas fa-user-plus"></i><p>No referrals yet.</p><p style="font-size:0.9rem;">Share your link to earn!</p></div>';
                else {
                    html += '<div class="referral-table"><table><tr><th>Email</th><th>Joined</th><th>Status</th><th>Bonus</th></tr>';
                    for (const d of ref.docs) {
                        const r = d.data();
                        const jd = r.createdAt?.seconds ? new Date(r.createdAt.seconds*1000).toLocaleDateString() : 'N/A';
                        const be = bonuses.find(b => b.referredId === d.id && b.type === 'referrer');
                        const status = r.membershipType === MEMBERSHIP_TYPES.PREMIUM ? '<span class="badge primary">Premium</span>' : r.membershipType === MEMBERSHIP_TYPES.ELITE ? '<span class="badge warning">Elite</span>' : '<span class="badge">Basic</span>';
                        let bs = '-';
                        if (be) bs = `<span class="commission-badge">$${be.amount.toFixed(2)} paid</span>`;
                        else if (r.membershipType === MEMBERSHIP_TYPES.PREMIUM) bs = '<span class="status-badge">Pending</span>';
                        html += `<tr><td>${r.email}</td><td>${jd}</td><td>${status}</td><td>${bs}</td></tr>`;
                    }
                    html += '</table></div>';
                }
                
                if (bonuses.length > 0) {
                    html += '<h4 style="margin:2rem 0 1rem 0;">Bonus History</h4><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;">';
                    bonuses.forEach(b => {
                        const d = b.creditedAt?.seconds ? new Date(b.creditedAt.seconds*1000).toLocaleDateString() : b.createdAt?.seconds ? new Date(b.createdAt.seconds*1000).toLocaleDateString() : 'N/A';
                        html += `<div class="submission-card" style="padding:1rem;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;"><span><i class="fas fa-gift" style="color:#10b981;"></i> <strong>$${b.amount.toFixed(2)}</strong></span><span class="commission-badge">${b.type==='referrer'?'Referrer':'Referred'}</span></div><p style="color:#64748b;font-size:0.85rem;margin-bottom:0.3rem;">From: ${b.referredEmail||'Referral'}</p><p style="color:#94a3b8;font-size:0.75rem;">${d}</p></div>`;
                    });
                    html += '</div>';
                }
                
                document.getElementById('content').innerHTML = html;
                try { await db.collection('users').doc(currentUser.uid).update({ totalReferrals: totalRef, referralEarnings: totalEarned }); } catch (e) { console.warn('Could not update referral stats:', e); }
            } catch (e) { console.error('Error loading referrals:', e); document.getElementById('content').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i><h4>Error Loading Referrals</h4><p>${e.message}</p><button class="btn btn-primary" onclick="loadReferrals()" style="margin-top:1rem;">Try Again</button></div>`; }
        }
        
        function selectMembership(type) {
            if (type === MEMBERSHIP_TYPES.BASIC) updateMembership(type);
            else showMembershipPayment(type);
        }
        
        function showMembershipPayment(type) {
            const p = getPackageByType(type);
            showModal(`
                <div class="modal-content"><div style="text-align:center;margin-bottom:1.5rem;"><i class="fas ${type===MEMBERSHIP_TYPES.PREMIUM?'fa-crown':'fa-gem'}" style="font-size:3rem;color:${type===MEMBERSHIP_TYPES.PREMIUM?'#6366f1':'#f59e0b'};margin-bottom:1rem;"></i><h3 style="margin-bottom:0.5rem;">Upgrade to ${p.name}</h3><p style="color:#64748b;">$${p.price} ${p.duration==='annual'?'per year':'lifetime'}</p></div>
                <div style="background:#f3f4f6;padding:1.5rem;border-radius:0.5rem;margin-bottom:1.5rem;"><p><strong>Pay via LIPANA GATEWAYS:</strong></p><p>1. Visit <a href="https://lipana.dev/pay/nextgen-membership" target="_blank">lipwa.com</a></p><p>2. Send $${p.price} to username: <strong>@nextgen</strong></p><p>3. Copy the transaction ID</p>${type===MEMBERSHIP_TYPES.ELITE&&p.welcomeBonus?`<p style="color:#10b981;margin-top:0.5rem;"><i class="fas fa-gift"></i> You'll receive a $${p.welcomeBonus} welcome bonus!</p>`:''}</div>
                <input type="text" id="transactionCode" placeholder="Enter Transaction ID">
                <div style="display:flex;gap:1rem;margin-top:1.5rem;"><button class="btn btn-success" style="flex:2;" onclick="submitMembershipPayment('${type}')"><i class="fas fa-check"></i> Verify Payment</button><button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Cancel</button></div></div>
            `);
        }
        
        async function submitMembershipPayment(type) {
            const code = document.getElementById('transactionCode')?.value;
            if (!code) { showAlert('Enter transaction ID', 'error'); return; }
            const p = getPackageByType(type);
            try {
                await db.collection('membershipPayments').add({ userId: currentUser.uid, userEmail: currentUser.email, membershipType: type, membershipName: p.name, transactionCode: code, amount: p.price, duration: p.duration, status: 'pending', submittedAt: firebase.firestore.FieldValue.serverTimestamp() });
                showAlert('Payment proof submitted! You will be upgraded once verified.', 'success');
                closeModal();
            } catch (e) { console.error('Error submitting payment:', e); showAlert('Error submitting payment', 'error'); }
        }
        
        async function updateMembership(type) {
            try {
                const p = getPackageByType(type);
                const upd = { membershipType: type, membershipPaid: type !== MEMBERSHIP_TYPES.BASIC, membershipStatus: 'active', updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                if (type === MEMBERSHIP_TYPES.PREMIUM && p.duration === 'annual') {
                    const exp = new Date(); exp.setFullYear(exp.getFullYear() + 1);
                    upd.membershipExpiry = firebase.firestore.Timestamp.fromDate(exp);
                }
                await db.collection('users').doc(currentUser.uid).update(upd);
                userData.membershipType = type;
                showAlert(`You are now on the ${p.name} plan!`, 'success');
                loadWithdrawals();
            } catch (e) { console.error('Error updating membership:', e); showAlert('Error updating membership', 'error'); }
        }
        
        async function loadMessages() {
            document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading messages...</p></div>';
            try {
                const s = await db.collection('messages').where('userId','==',currentUser.uid).get();
                let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;"><h3>Messages</h3><button class="btn btn-success" onclick="showComposeMessage()"><i class="fas fa-plus"></i> New Message</button></div>`;
                if (s.empty) html += `<div class="empty-state"><i class="fas fa-envelope-open-text"></i><h4>No Messages</h4><p>You don't have any messages yet.</p><button class="btn btn-primary" onclick="showComposeMessage()" style="margin-top:1rem;"><i class="fas fa-pen"></i> Send first message</button></div>`;
                else {
                    const msgs = []; s.forEach(d => msgs.push({ id: d.id, ...d.data() }));
                    msgs.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
                    const threads = {};
                    msgs.forEach(m => {
                        const tid = m.parentMessageId || m.id;
                        if (!threads[tid]) threads[tid] = { id: tid, messages: [], unreadCount: 0, lastMessage: m };
                        threads[tid].messages.push(m);
                        if (!m.read && m.fromAdmin) threads[tid].unreadCount++;
                        threads[tid].messages.sort((a,b) => (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0));
                        threads[tid].lastMessage = threads[tid].messages[threads[tid].messages.length-1];
                    });
                    const list = Object.values(threads).sort((a,b) => (b.lastMessage.createdAt?.seconds||0) - (a.lastMessage.createdAt?.seconds||0));
                    html += '<div style="display:flex;flex-direction:column;gap:1rem;">';
                    for (const t of list) {
                        const last = t.lastMessage;
                        const unread = t.unreadCount > 0;
                        let d = 'N/A';
                        if (last.createdAt?.seconds) {
                            const date = new Date(last.createdAt.seconds*1000);
                            const days = Math.floor((new Date() - date) / (86400000));
                            if (days === 0) d = 'Today';
                            else if (days === 1) d = 'Yesterday';
                            else if (days < 7) d = `${days} days ago`;
                            else d = date.toLocaleDateString();
                        }
                        const subj = t.messages[0].subject || 'Conversation with Admin';
                        html += `<div class="submission-card message-card ${unread?'unread':''}" onclick="viewMessageThread('${t.id}')" style="padding:1rem;"><div style="display:flex;justify-content:space-between;align-items:start;"><div style="flex:1;"><div class="message-preview"><span class="message-subject ${unread?'unread':''}" style="font-size:1rem;">${subj}${unread?` <span class="unread-badge">${t.unreadCount} new</span>`:''}</span><span style="font-size:0.8rem;color:#64748b;"><i class="far fa-clock"></i> ${d}</span></div><div class="message-excerpt" style="font-size:0.85rem;">${(last.message||'').substring(0,70)}${(last.message||'').length>=70?'...':''}</div><div style="display:flex;gap:1rem;margin-top:0.3rem;font-size:0.8rem;color:#64748b;"><span><i class="far fa-comment"></i> ${t.messages.length} message${t.messages.length!==1?'s':''}</span><span><i class="fas ${last.fromAdmin?'fa-user-shield':'fa-user'}"></i> Last: ${last.fromAdmin?'Admin':'You'}</span></div></div></div></div>`;
                    }
                    html += '</div>';
                }
                document.getElementById('content').innerHTML = html;
            } catch (e) { console.error('Error loading messages:', e); document.getElementById('content').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i><h4>Error Loading Messages</h4><p>${e.message}</p><button class="btn btn-primary" onclick="loadMessages()" style="margin-top:1rem;">Try Again</button></div>`; }
        }
        
        function showComposeMessage() {
            showModal(`
                <div class="modal-content"><div style="border-bottom:2px solid #10b981;padding-bottom:1rem;margin-bottom:1.5rem;"><h3 style="color:#10b981;margin-bottom:0.3rem;">New Message</h3><p style="color:#64748b;font-size:0.9rem;">Send a message to admin</p></div>
                <div style="margin-bottom:1rem;"><label style="font-weight:600;margin-bottom:0.3rem;display:block;">Subject</label><input type="text" id="messageSubject" placeholder="e.g., Question about withdrawal"></div>
                <div style="margin-bottom:1rem;"><label style="font-weight:600;margin-bottom:0.3rem;display:block;">Message</label><textarea id="messageContent" class="submit-textbox" placeholder="Type your message..." style="min-height:150px;"></textarea></div>
                <div style="display:flex;gap:1rem;margin-top:1.5rem;"><button class="btn btn-success" style="flex:2;" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send Message</button><button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Cancel</button></div>
                <p style="font-size:0.85rem;color:#64748b;margin-top:1rem;text-align:center;"><i class="fas fa-info-circle"></i> Messages typically responded within 24 hours.</p></div>
            `);
        }
        
        async function sendMessage() {
            const subj = document.getElementById('messageSubject')?.value;
            const msg = document.getElementById('messageContent')?.value;
            if (!subj?.trim()) { showAlert('Please enter a subject', 'error'); return; }
            if (!msg?.trim()) { showAlert('Please enter a message', 'error'); return; }
            if (msg.length < 10) { showAlert('Message must be at least 10 characters', 'error'); return; }
            try {
                const d = { userId: currentUser.uid, userEmail: currentUser.email, userDisplayName: userData.displayName||'User', subject: subj.trim(), message: msg.trim(), fromAdmin: false, read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp(), status: 'sent' };
                const r = await db.collection('messages').add(d);
                await db.collection('messages').doc(r.id).update({ parentMessageId: r.id });
                closeModal(); showAlert('Message sent!', 'success'); loadMessages();
            } catch (e) { console.error('Error sending message:', e); showAlert('Message sent successfully', 'success'); }
        }
        
        async function viewMessageThread(id) {
            try {
                const s = await db.collection('messages').where('parentMessageId','==',id).orderBy('createdAt','asc').get();
                if (s.empty) { showAlert('Thread not found', 'error'); return; }
                const msgs = []; s.forEach(d => msgs.push({ id: d.id, ...d.data() }));
                const subj = msgs[0].subject || 'Conversation';
                for (const m of msgs.filter(m => m.fromAdmin && !m.read)) await db.collection('messages').doc(m.id).update({ read: true, readAt: firebase.firestore.FieldValue.serverTimestamp() });
                let html = `<div class="modal-content"><div style="border-bottom:2px solid #10b981;padding-bottom:1rem;margin-bottom:1.5rem;"><h3 style="color:#10b981;margin-bottom:0.3rem;">${subj}</h3><p style="color:#64748b;font-size:0.9rem;">Message Thread</p></div><div class="message-thread" id="messageThread">`;
                msgs.forEach(m => {
                    const d = m.createdAt?.seconds ? new Date(m.createdAt.seconds*1000).toLocaleString() : 'N/A';
                    html += `<div class="message-bubble ${m.fromAdmin?'admin':'user'}"><div class="message-header ${m.fromAdmin?'admin':'user'}"><span>${m.fromAdmin?'Admin':'You'}</span><span class="message-time">${d}</span></div><div class="message-content">${m.message.replace(/\n/g,'<br>')}</div>${!m.fromAdmin?`<div class="message-status ${m.read?'read':'unread'}">${m.read?'Read':'Delivered'} <i class="fas ${m.read?'fa-check-double':'fa-check'}"></i></div>`:''}</div>`;
                });
                html += `</div><div class="compose-area"><h4 style="margin-bottom:0.5rem;">Reply</h4><textarea id="replyMessage" class="message-input" placeholder="Type your reply..."></textarea><div style="display:flex;gap:0.5rem;"><button class="btn btn-success" style="flex:2;" onclick="sendReply('${id}')"><i class="fas fa-reply"></i> Send Reply</button><button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Close</button></div></div></div>`;
                showModal(html);
                setTimeout(() => { const t = document.getElementById('messageThread'); if (t) t.scrollTop = t.scrollHeight; }, 100);
            } catch (e) { console.error('Error loading thread:', e); showAlert('Error loading thread', 'error'); }
        }
        
        async function sendReply(id) {
            const r = document.getElementById('replyMessage')?.value;
            if (!r?.trim()) { showAlert('Please enter a reply', 'error'); return; }
            if (r.length < 5) { showAlert('Reply too short', 'error'); return; }
            try {
                const f = await db.collection('messages').where('parentMessageId','==',id).orderBy('createdAt','asc').limit(1).get();
                const fm = f.docs[0]?.data();
                await db.collection('messages').add({ userId: currentUser.uid, userEmail: currentUser.email, userDisplayName: userData.displayName||'User', parentMessageId: id, subject: fm?.subject||'Re: Conversation', message: r.trim(), fromAdmin: false, read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp(), status: 'sent' });
                closeModal(); viewMessageThread(id); showAlert('Reply sent!', 'success');
            } catch (e) { console.error('Error sending reply:', e); showAlert('Error sending reply', 'error'); }
        }
        
        function loadProfile() {
            const jd = userData.createdAt?.seconds ? new Date(userData.createdAt.seconds*1000).toLocaleDateString() : 'N/A';
            const cp = getPackageByType(userData.membershipType);
            document.getElementById('content').innerHTML = `
                <h3 style="margin-bottom:1.5rem;">Profile Settings</h3>
                <div style="background:#f8fafc;border-radius:0.5rem;padding:1.5rem;border:1px solid #e5e7eb;">
                    <input type="text" id="profileName" value="${userData.displayName||''}" placeholder="Display Name">
                    <input type="tel" id="profilePhone" value="${userData.phone||''}" placeholder="Phone Number">
                    <button class="btn btn-primary" style="width:100%;" onclick="updateProfile()">Update Profile</button>
                </div>
                <div style="margin-top:1.5rem;padding:1.5rem;background:#f8fafc;border-radius:0.5rem;border:1px solid #e5e7eb;">
                    <p style="font-size:1rem;margin-bottom:0.5rem;"><strong>Email:</strong> ${userData.email}</p>
                    <p style="font-size:1rem;margin-bottom:0.5rem;"><strong>Member since:</strong> ${jd}</p>
                    <p style="font-size:1rem;margin-bottom:0.5rem;"><strong>Wallet Balance:</strong> $${(userData.wallet||0).toFixed(2)}</p>
                    <p style="font-size:1rem;margin-bottom:0.5rem;"><strong>Membership:</strong> <span class="${userData.membershipType===MEMBERSHIP_TYPES.ELITE?'premium-badge':userData.membershipType===MEMBERSHIP_TYPES.PREMIUM?'badge primary':'badge warning'}">${cp.name}</span></p>
                    ${userData.membershipExpiry?`<p style="font-size:1rem;margin-bottom:0.5rem;"><strong>Membership Expiry:</strong> ${userData.membershipExpiry.toDate().toLocaleDateString()}</p>`:''}
                    <p style="font-size:1rem;margin-bottom:0.5rem;"><strong>Total Referrals:</strong> ${userData.totalReferrals||0}</p>
                    <p style="font-size:1rem;margin-bottom:0.5rem;"><strong>Referral Earnings:</strong> $${(userData.referralEarnings||0).toFixed(2)}</p>
                    <p style="font-size:1rem;margin-bottom:0.5rem;"><strong>Total Fees Paid:</strong> $${(userData.totalFeesPaid||0).toFixed(2)}</p>
                </div>
                <div style="margin-top:1rem;text-align:center;font-size:0.8rem;color:#94a3b8;"><i class="fas fa-globe"></i> nextgen.joblify.app</div>
            `;
        }
        
        async function updateProfile() {
            const n = document.getElementById('profileName').value;
            const p = document.getElementById('profilePhone').value;
            if (!n) { showAlert('Name is required', 'error'); return; }
            try {
                await db.collection('users').doc(currentUser.uid).update({ displayName: n, phone: p||'' });
                userData.displayName = n; userData.phone = p;
                document.getElementById('userName').textContent = n;
                showAlert('Profile updated!', 'success');
            } catch (e) { console.error('Error updating profile:', e); showAlert('Error updating profile', 'error'); }
        }
    </script>
</body>
</html>
