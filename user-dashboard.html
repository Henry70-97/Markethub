<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen · User Dashboard</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .header { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 2rem; padding: 1rem 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; color: white; }
        .logo h2 { background: linear-gradient(135deg, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-badge { background: #6366f1; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.9rem; }
        .frozen-badge { background: #ef4444; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.9rem; }
        .logout-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 1.5rem; padding: 1.5rem; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .stat-card i { font-size: 2rem; color: #818cf8; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .tab { padding: 0.8rem 1.5rem; border: none; border-radius: 40px; background: rgba(255,255,255,0.1); color: white; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .tab.active { background: #6366f1; }
        .content { background: white; border-radius: 2rem; padding: 2rem; min-height: 500px; }
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .task-card { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .task-title { font-size: 1.2rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
        .task-meta { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .badge { padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .badge.success { background: #10b98120; color: #10b981; border: 1px solid #10b981; }
        .badge.warning { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b; }
        .badge.danger { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }
        .badge.primary { background: #6366f120; color: #6366f1; border: 1px solid #6366f1; }
        .badge.info { background: #3b82f620; color: #3b82f6; border: 1px solid #3b82f6; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; margin: 0.2rem; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .withdrawal-form { background: #f8fafc; padding: 1.5rem; border-radius: 1rem; margin-top: 1rem; }
        .petition-box { background: #fef3c7; padding: 1.5rem; border-radius: 1rem; margin-top: 1rem; border-left: 4px solid #f59e0b; }
        input, textarea, select { width: 100%; padding: 0.8rem; border: 2px solid #e2e8f0; border-radius: 40px; margin-bottom: 1rem; font-size: 1rem; }
        textarea { border-radius: 20px; min-height: 100px; }
        .submission-card { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; border-left: 4px solid #6366f1; }
        .profile-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
        .info-card { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; }
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">
                <h2>🔷 NextGen</h2>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span id="userName">Loading...</span>
                <span class="user-badge" id="membershipBadge">Basic</span>
                <span class="frozen-badge" id="frozenBadge" style="display: none;">FROZEN</span>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="tabs">
            <button class="tab active" data-tab="tasks">📋 Available Tasks</button>
            <button class="tab" data-tab="submissions">📝 My Submissions</button>
            <button class="tab" data-tab="withdrawals">💰 Withdrawals</button>
            <button class="tab" data-tab="profile">👤 Profile</button>
            <button class="tab" data-tab="petition" id="petitionTab" style="display: none;">📢 Send Petition</button>
        </div>

        <div class="content" id="content"></div>
    </div>

    <!-- Alert/Modal placeholder (simple alert) -->
    <div style="display: none;" id="alert"></div>

    <script>
        // Firebase Config (replace with your own)
        const firebaseConfig = {
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",
            authDomain: "nextgen-5fb6f.firebaseapp.com",
            projectId: "nextgen-5fb6f",
            storageBucket: "nextgen-5fb6f.firebasestorage.app",
            messagingSenderId: "100132076455",
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global variables
        let currentUser = null;
        let userData = null;
        let currentTab = 'tasks';
        let isFrozen = false;

        // Check auth state
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html'; // redirect to login
                return;
            }
            const doc = await db.collection('users').doc(user.uid).get();
            if (!doc.exists) {
                alert('User not found');
                auth.signOut();
                return;
            }
            userData = doc.data();
            currentUser = user;
            isFrozen = userData.frozen === true;

            // Update UI
            document.getElementById('userName').textContent = userData.displayName || user.email;
            document.getElementById('membershipBadge').textContent = (userData.membershipType || 'basic').toUpperCase();
            if (isFrozen) {
                document.getElementById('frozenBadge').style.display = 'inline-block';
                document.getElementById('petitionTab').style.display = 'inline-block';
            } else {
                document.getElementById('frozenBadge').style.display = 'none';
                document.getElementById('petitionTab').style.display = 'none';
            }

            loadDashboard();
        });

        // Logout
        function logout() {
            auth.signOut();
            window.location.href = 'index.html';
        }

        // Simple alert
        function showAlert(message, type = 'info') {
            alert(message); // you can replace with a nicer modal
        }

        // Format date
        function formatDate(timestamp) {
            if (!timestamp) return 'N/A';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        }

        // Format currency
        function formatCurrency(amount) {
            return '$' + (amount || 0).toFixed(2);
        }

        // Tab switching
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            switch (tab) {
                case 'tasks': loadTasks(); break;
                case 'submissions': loadSubmissions(); break;
                case 'withdrawals': loadWithdrawals(); break;
                case 'profile': loadProfile(); break;
                case 'petition': loadPetition(); break;
            }
        }

        // Load dashboard stats
        async function loadDashboard() {
            // Update stats grid
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <i class="fas fa-wallet"></i>
                    <div class="stat-value">${formatCurrency(userData.wallet || 0)}</div>
                    <div class="stat-label">Wallet Balance</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-tasks"></i>
                    <div class="stat-value">${userData.tasksCompleted || 0}</div>
                    <div class="stat-label">Tasks Completed</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="stat-value">${userData.totalReferrals || 0}</div>
                    <div class="stat-label">Referrals</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-gift"></i>
                    <div class="stat-value">${formatCurrency(userData.referralEarnings || 0)}</div>
                    <div class="stat-label">Referral Earnings</div>
                </div>
            `;
            loadTasks();
        }

        // ==================== TASKS (with acceptance limit) ====================
        async function loadTasks() {
            let html = '<h3 style="margin-bottom:1.5rem;">Available Tasks</h3>';

            // Get all active tasks
            const tasksSnap = await db.collection('tasks').where('active', '==', true).orderBy('createdAt', 'desc').get();
            if (tasksSnap.empty) {
                html += '<p>No tasks available at the moment.</p>';
                document.getElementById('content').innerHTML = html;
                return;
            }

            // For each task, get acceptance count and check if current user already accepted
            const tasks = [];
            for (const doc of tasksSnap.docs) {
                const task = { id: doc.id, ...doc.data() };
                // Get acceptance count
                const acceptancesSnap = await db.collection('taskAcceptances').where('taskId', '==', doc.id).get();
                task.acceptedCount = acceptancesSnap.size;
                // Check if current user already accepted
                const userAcceptance = acceptancesSnap.docs.find(a => a.data().userId === currentUser.uid);
                task.userAccepted = !!userAcceptance;
                tasks.push(task);
            }

            html += '<div class="task-grid">';
            tasks.forEach(task => {
                const canAccept = !task.userAccepted && task.acceptedCount < 2 && !isFrozen; // frozen users cannot accept tasks? adjust if needed
                const acceptButton = canAccept 
                    ? `<button class="btn btn-primary accept-task-btn" data-task-id="${task.id}">Accept Task</button>`
                    : `<button class="btn btn-primary" disabled>${task.userAccepted ? 'Already Accepted' : task.acceptedCount >= 2 ? 'Full' : 'Unavailable'}</button>`;

                html += `
                    <div class="task-card">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">
                            <span class="badge primary">${task.category}</span>
                            <span class="badge info">${task.difficulty}</span>
                            <span class="badge success">$${task.reward}</span>
                        </div>
                        <p style="color:#475569; margin-bottom:1rem;">${task.description.substring(0,100)}...</p>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span><i class="fas fa-users"></i> ${task.acceptedCount}/2 accepted</span>
                            ${acceptButton}
                        </div>
                        <button class="btn btn-info view-details-btn" data-task-id="${task.id}" style="width:100%; margin-top:0.5rem;">View Details</button>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }

        // Accept Task (with transaction to ensure limit)
        async function acceptTask(taskId) {
            if (isFrozen) {
                showAlert('You cannot accept tasks while your account is frozen.', 'error');
                return;
            }

            try {
                await db.runTransaction(async (transaction) => {
                    // Get task document
                    const taskRef = db.collection('tasks').doc(taskId);
                    const taskDoc = await transaction.get(taskRef);
                    if (!taskDoc.exists) throw new Error('Task not found');

                    // Check current acceptances
                    const acceptancesQuery = await db.collection('taskAcceptances')
                        .where('taskId', '==', taskId)
                        .get();
                    const currentCount = acceptancesQuery.size;

                    // Check if user already accepted
                    const alreadyAccepted = acceptancesQuery.docs.some(doc => doc.data().userId === currentUser.uid);
                    if (alreadyAccepted) throw new Error('You have already accepted this task.');

                    if (currentCount >= 2) throw new Error('This task already has 2 participants.');

                    // Add acceptance record
                    const acceptanceRef = db.collection('taskAcceptances').doc();
                    transaction.set(acceptanceRef, {
                        taskId: taskId,
                        userId: currentUser.uid,
                        userEmail: userData.email,
                        acceptedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // Optionally update task's acceptedCount field if you maintain it
                    // transaction.update(taskRef, { acceptedCount: currentCount + 1 });
                });

                showAlert('Task accepted successfully!', 'success');
                loadTasks();
            } catch (error) {
                showAlert('Error accepting task: ' + error.message, 'error');
            }
        }

        // View Task Details (modal or expanded view)
        async function viewTaskDetails(taskId) {
            const taskDoc = await db.collection('tasks').doc(taskId).get();
            const task = taskDoc.data();
            // Simple alert for now; you can make a proper modal
            alert(`
                ${task.title}
                Client: ${task.clientName || 'NextGen'}
                Reward: $${task.reward}
                Category: ${task.category} | Difficulty: ${task.difficulty}
                Deadline: ${task.deadline ? formatDate(task.deadline) : 'No deadline'}

                Description:
                ${task.description}

                Requirements:
                ${task.requirements || 'N/A'}

                Instructions:
                ${task.instructions || 'N/A'}
            `);
        }

        // ==================== SUBMISSIONS ====================
        async function loadSubmissions() {
            const subsSnap = await db.collection('submissions')
                .where('userId', '==', currentUser.uid)
                .orderBy('submittedAt', 'desc')
                .get();

            let html = '<h3 style="margin-bottom:1.5rem;">My Submissions</h3>';
            if (subsSnap.empty) {
                html += '<p>You have not submitted any work yet.</p>';
            } else {
                subsSnap.forEach(doc => {
                    const sub = doc.data();
                    const statusClass = sub.status === 'approved' ? 'success' : (sub.status === 'rejected' ? 'danger' : 'warning');
                    html += `
                        <div class="submission-card">
                            <div style="display:flex; justify-content:space-between;">
                                <h4>${sub.taskTitle}</h4>
                                <span class="badge ${statusClass}">${sub.status}</span>
                            </div>
                            <p><strong>Submitted:</strong> ${formatDate(sub.submittedAt)}</p>
                            <p><strong>Your work:</strong> ${sub.workText}</p>
                            ${sub.score ? `<p><strong>Score:</strong> ${sub.score}</p>` : ''}
                            ${sub.review ? `<p><strong>Feedback:</strong> ${sub.review}</p>` : ''}
                            ${sub.earned ? `<p><strong>Earned:</strong> $${sub.earned}</p>` : ''}
                        </div>
                    `;
                });
            }
            document.getElementById('content').innerHTML = html;
        }

        // ==================== WITHDRAWALS & PETITION ====================
        async function loadWithdrawals() {
            let html = '<h3 style="margin-bottom:1.5rem;">Withdrawals</h3>';

            // If frozen, show petition box instead of withdrawal form
            if (isFrozen) {
                html += `
                    <div class="petition-box">
                        <h4>Your account is frozen</h4>
                        <p>You cannot make withdrawals while your account is frozen. Please send a petition to the admin to resolve this.</p>
                        <textarea id="petitionMessage" placeholder="Explain why your account should be unfrozen..."></textarea>
                        <button class="btn btn-warning" id="sendPetitionBtn">Send Petition</button>
                    </div>
                `;
            } else {
                // Show withdrawal form
                html += `
                    <div class="withdrawal-form">
                        <h4>Request Withdrawal</h4>
                        <p>Minimum withdrawal: $5</p>
                        <input type="number" id="withdrawAmount" placeholder="Amount (USD)" min="5" step="0.01">
                        <select id="withdrawMethod">
                            <option value="M-Pesa">M-Pesa</option>
                            <option value="Airtel Money">Airtel Money</option>
                            <option value="Bank Transfer">Bank Transfer</option>
                        </select>
                        <input type="text" id="withdrawPhone" placeholder="Phone number / Account details">
                        <button class="btn btn-success" id="requestWithdrawalBtn">Request Withdrawal</button>
                    </div>
                `;
            }

            // Show previous withdrawals
            const withdrawalsSnap = await db.collection('withdrawals')
                .where('userId', '==', currentUser.uid)
                .orderBy('requestedAt', 'desc')
                .limit(20)
                .get();

            if (!withdrawalsSnap.empty) {
                html += '<h4 style="margin-top:2rem;">Withdrawal History</h4>';
                withdrawalsSnap.forEach(doc => {
                    const w = doc.data();
                    const statusClass = w.status === 'paid' ? 'success' : (w.status === 'rejected' ? 'danger' : 'warning');
                    html += `
                        <div class="submission-card">
                            <div style="display:flex; justify-content:space-between;">
                                <span><strong>$${w.amount}</strong> via ${w.method}</span>
                                <span class="badge ${statusClass}">${w.status}</span>
                            </div>
                            <p>Requested: ${formatDate(w.requestedAt)}</p>
                            ${w.paidAt ? `<p>Paid: ${formatDate(w.paidAt)}</p>` : ''}
                        </div>
                    `;
                });
            }

            document.getElementById('content').innerHTML = html;
        }

        // Request withdrawal
        async function requestWithdrawal() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('withdrawMethod').value;
            const phone = document.getElementById('withdrawPhone').value;

            if (!amount || amount < 5) {
                showAlert('Minimum withdrawal is $5', 'error');
                return;
            }
            if (!phone) {
                showAlert('Please enter payment details', 'error');
                return;
            }
            if (amount > (userData.wallet || 0)) {
                showAlert('Insufficient balance', 'error');
                return;
            }

            try {
                // Deduct from wallet immediately? Usually we deduct on approval, but we'll deduct now to prevent double requests.
                await db.runTransaction(async (transaction) => {
                    const userRef = db.collection('users').doc(currentUser.uid);
                    const userDoc = await transaction.get(userRef);
                    const currentWallet = userDoc.data().wallet || 0;
                    if (currentWallet < amount) throw new Error('Insufficient balance');

                    transaction.update(userRef, {
                        wallet: firebase.firestore.FieldValue.increment(-amount)
                    });

                    const withdrawalRef = db.collection('withdrawals').doc();
                    transaction.set(withdrawalRef, {
                        userId: currentUser.uid,
                        userEmail: userData.email,
                        amount: amount,
                        amountKES: amount * 130, // using default rate
                        method: method,
                        phone: phone,
                        status: 'pending',
                        requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });

                showAlert('Withdrawal request submitted successfully!', 'success');
                loadWithdrawals();
                // Refresh user data
                const updatedUser = await db.collection('users').doc(currentUser.uid).get();
                userData = updatedUser.data();
            } catch (error) {
                showAlert('Error requesting withdrawal: ' + error.message, 'error');
            }
        }

        // Send petition
        async function sendPetition() {
            const message = document.getElementById('petitionMessage').value;
            if (!message.trim()) {
                showAlert('Please enter a message', 'error');
                return;
            }

            try {
                await db.collection('petitions').add({
                    userId: currentUser.uid,
                    userEmail: userData.email,
                    message: message,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showAlert('Petition sent to admin.', 'success');
                document.getElementById('petitionMessage').value = '';
            } catch (error) {
                showAlert('Error sending petition: ' + error.message, 'error');
            }
        }

        // ==================== PROFILE ====================
        async function loadProfile() {
            const html = `
                <h3 style="margin-bottom:1.5rem;">Profile Information</h3>
                <div class="profile-info">
                    <div class="info-card">
                        <h4>Account Details</h4>
                        <p><strong>Name:</strong> ${userData.displayName || 'N/A'}</p>
                        <p><strong>Email:</strong> ${userData.email}</p>
                        <p><strong>Member since:</strong> ${userData.createdAt ? formatDate(userData.createdAt) : 'N/A'}</p>
                        <p><strong>Membership:</strong> ${(userData.membershipType || 'basic').toUpperCase()}</p>
                        <p><strong>Verified:</strong> ${userData.verified ? 'Yes' : 'No'}</p>
                        <p><strong>Status:</strong> ${isFrozen ? 'Frozen' : 'Active'}</p>
                    </div>
                    <div class="info-card">
                        <h4>Statistics</h4>
                        <p><strong>Wallet Balance:</strong> ${formatCurrency(userData.wallet || 0)}</p>
                        <p><strong>Total Earned:</strong> ${formatCurrency(userData.totalEarned || 0)}</p>
                        <p><strong>Tasks Completed:</strong> ${userData.tasksCompleted || 0}</p>
                        <p><strong>Referral Earnings:</strong> ${formatCurrency(userData.referralEarnings || 0)}</p>
                        <p><strong>Total Referrals:</strong> ${userData.totalReferrals || 0}</p>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        // ==================== PETITION TAB (if frozen) ====================
        function loadPetition() {
            const html = `
                <h3 style="margin-bottom:1.5rem;">Send a Petition</h3>
                <div class="petition-box">
                    <p>Your account is frozen. Please explain why you think this should be resolved, and the admin will review your petition.</p>
                    <textarea id="petitionMessage" placeholder="Your message..."></textarea>
                    <button class="btn btn-warning" id="sendPetitionBtn">Send Petition</button>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        // ==================== EVENT LISTENERS ====================
        document.addEventListener('click', async (e) => {
            const target = e.target;

            if (target.id === 'logoutBtn' || target.closest('#logoutBtn')) {
                logout();
                return;
            }

            if (target.classList.contains('tab')) {
                const tab = target.getAttribute('data-tab');
                if (tab) switchTab(tab);
                return;
            }

            // Accept Task button
            if (target.classList.contains('accept-task-btn')) {
                const taskId = target.getAttribute('data-task-id');
                await acceptTask(taskId);
                return;
            }

            // View Details button
            if (target.classList.contains('view-details-btn')) {
                const taskId = target.getAttribute('data-task-id');
                await viewTaskDetails(taskId);
                return;
            }

            // Request Withdrawal
            if (target.id === 'requestWithdrawalBtn') {
                await requestWithdrawal();
                return;
            }

            // Send Petition (from withdrawals or petition tab)
            if (target.id === 'sendPetitionBtn') {
                await sendPetition();
                return;
            }
        });

        // Expose functions to global if needed
        window.switchTab = switchTab;
    </script>
</body>
</html>
